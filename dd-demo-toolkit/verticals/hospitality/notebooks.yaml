            text: |
              # IoT Gateway Fleet Health Investigation

              Cross-property analysis of gateway connectivity, connected device counts, and WiFi signal correlation. Focus on identifying properties where WiFi conditions are degrading IoT device connectivity.

              ---
              ## Connected Devices per Gateway by Property

      - type: notebook_cells
