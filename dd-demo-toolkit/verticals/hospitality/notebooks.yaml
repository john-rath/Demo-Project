  # =========================================================================
  # 6. AI Stay Planner: Model Performance & Revenue Impact
  # =========================================================================
  - id: "ai-stay-planner-performance"
    name: "AI Stay Planner: Model Performance & Revenue Impact"
    type: report
    description: "AI model inference latency, recommendation acceptance rates, token usage, and revenue attribution."
    time_range: "1h"
    tags: ["vertical:hospitality", "dd-demo-toolkit:true", "team:digital", "impact:revenue"]
    cells:
      - type: notebook_cells
        attributes:
          definition:
