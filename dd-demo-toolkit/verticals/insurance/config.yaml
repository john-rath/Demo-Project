vertical:
  name: insurance
  display_name: Multi-State P&C/Life Insurer
  description: >
    Realistic large-scale property & casualty + life insurance operations.
    Multi-region policy, underwriting, claims, and billing infrastructure
    supporting 50+ million policies. Demonstrates claims surge scenarios,
    telematics integration, document processing at scale, and regulatory compliance.
  env_prefix: insurer
  emit_interval_sec: 15

locations:
  dimensions:
    - name: region
      values:
        - us-east
        - us-central
        - us-west
        - canada
    - name: environment
      values:
        - production
        - staging
        - disaster-recovery
    - name: line_of_business
      values:
        - Auto
        - Home
        - Life
        - Commercial
        - Health

device_categories:
  claims_infrastructure:
    ip_base: "10.200"
    devices:
      - type: claims_intake_server
        manufacturer: Dell
        model: PowerEdge R750
        count: 12
        metrics:
          - name: claims_received_per_min
            unit: claims/min
            baseline: 450
            fluctuation: 0.15
          - name: avg_processing_ms
            unit: ms
            baseline: 320
            fluctuation: 0.20
          - name: validation_errors
            unit: errors/min
            baseline: 12
            fluctuation: 0.30
          - name: document_queue_depth
            unit: documents
            baseline: 850
            fluctuation: 0.25
          - name: ocr_confidence_pct
            unit: "%"
            baseline: 94.2
            fluctuation: 0.08

      - type: adjuster_mobile_device
        manufacturer: Apple
        model: iPhone 14 Pro
        firmware: iOS 17.2
        count: 200
        battery_powered: true
        metrics:
          - name: photo_uploads_per_hour
            unit: photos/hr
            baseline: 28
            fluctuation: 0.35
          - name: gps_accuracy_m
            unit: meters
            baseline: 8.5
            fluctuation: 0.25
          - name: app_crash_rate
            unit: "%"
            baseline: 0.8
            fluctuation: 0.40
          - name: sync_lag_ms
            unit: ms
            baseline: 150
            fluctuation: 0.30
          - name: battery_pct
            unit: "%"
            baseline: 65
            fluctuation: 0.20

      - type: document_processor
        manufacturer: Dell
        model: PowerEdge C6720
        count: 8
        metrics:
          - name: pages_processed_per_min
            unit: pages/min
            baseline: 980
            fluctuation: 0.12
          - name: ocr_accuracy_pct
            unit: "%"
            baseline: 96.8
            fluctuation: 0.05
          - name: extraction_confidence
            unit: "%"
            baseline: 92.1
            fluctuation: 0.10
          - name: classification_errors
            unit: errors/min
            baseline: 4
            fluctuation: 0.40
          - name: queue_backlog
            unit: documents
            baseline: 420
