vertical:
  name: manufacturing
  display_name: Automotive Manufacturing Plant
  description: Multi-plant automotive production facility with industrial equipment, quality systems, environmental controls, and supply chain management. Simulates Tesla/Toyota-scale manufacturing with SCADA, MES, and predictive maintenance.
  env_prefix: mfg
  emit_interval_sec: 15

locations:
  dimensions:
  - name: plant
    values:
    - Plant-A-Detroit
    - Plant-B-Austin
    - Plant-C-Munich
  - name: line
    values:
    - Assembly-1
    - Assembly-2
    - Painting
    - Welding
    - Quality-Control
    - Packaging
  - name: zone
    values:
    - Zone-A
    - Zone-B
    - Zone-C

device_categories:
  production_equipment:
    ip_base: '10.200'
    line_pool:
    - Assembly-1
    - Assembly-2
    - Painting
    - Welding
    - Quality-Control
    - Packaging
    devices:
    - type: plc_controller
      manufacturer: Siemens
      model: S7-1500
      firmware: 2.9.1
      count: 45
      metrics:
      - name: mfg.device.cycle_time_ms
        type: gauge
        unit: ms
        range: [15, 200]
        drift: 5
      - name: mfg.device.cpu_load_pct
        type: gauge
        unit: '%'
        range: [10, 90]
        drift: 2
      - name: mfg.device.program_errors
        type: counter
        unit: errors
        range: [0, 5]
        drift: 0.3
      - name: mfg.device.io_module_status
        type: gauge
        unit: status
        range: [0, 1]
        drift: 0.05
      - name: mfg.device.scan_time_ms
        type: gauge
        unit: ms
        range: [1, 50]
        drift: 1
    - type: cnc_machine
      manufacturer: Fanuc
      model: RoboDrill
      firmware: 34.26.21
      count: 20
      metrics:
      - name: mfg.device.spindle_speed_rpm
        type: gauge
        unit: rpm
        range: [800, 12000]
        drift: 150
      - name: mfg.device.feed_rate_mm_min
        type: gauge
        unit: mm/min
        range: [50, 5000]
        drift: 50
      - name: mfg.device.tool_wear_pct
        type: gauge
        unit: '%'
        range: [0, 100]
        drift: 0.5
      - name: mfg.device.vibration_mm_s
        type: gauge
        unit: mm/s
        range: [0.1, 5.0]
        drift: 0.2
      - name: mfg.device.coolant_temp_c
        type: gauge
        unit: C
        range: [15, 60]
        drift: 0.5
      - name: mfg.device.part_count
        type: counter
        unit: parts
        range: [0, 1000]
        drift: 1
    - type: robot_arm
      manufacturer: ABB
      model: IRB 6700
      firmware: 6.10.02
      count: 30
      metrics:
      - name: mfg.device.joint_temperature_c
        type: gauge
        unit: C
        range: [25, 85]
        drift: 1
      - name: mfg.device.servo_error_count
        type: counter
        unit: errors
        range: [0, 10]
        drift: 0.3
      - name: mfg.device.cycle_time_ms
        type: gauge
        unit: ms
        range: [200, 3000]
        drift: 30
      - name: mfg.device.payload_kg
        type: gauge
        unit: kg
        range: [0, 200]
        drift: 2
      - name: mfg.device.axis_position_deg
        type: gauge
        unit: deg
        range: [-180, 180]
        drift: 5
      - name: mfg.device.collision_events
        type: counter
        unit: events
        range: [0, 2]
        drift: 0.05
    - type: conveyor_system
      manufacturer: Bosch Rexroth
      model: TCI-4-Series
      firmware: 4.7.2
      count: 15
      metrics:
      - name: mfg.device.belt_speed_m_min
        type: gauge
        unit: m/min
        range: [0, 60]
        drift: 1
      - name: mfg.device.motor_current_a
        type: gauge
        unit: A
        range: [5, 80]
        drift: 1
      - name: mfg.device.belt_tension_n
        type: gauge
        unit: N
        range: [500, 5000]
        drift: 50
      - name: mfg.device.jam_events
        type: counter
        unit: events
        range: [0, 5]
        drift: 0.1
      - name: mfg.device.items_per_min
        type: gauge
        unit: items/min
        range: [0, 200]
        drift: 5
    - type: press_machine
      manufacturer: Schuler
      model: SERVO Press 4000
      firmware: 8.2.1
      count: 8
      metrics:
      - name: mfg.device.tonnage_kn
        type: gauge
        unit: kN
        range: [100, 4000]
        drift: 30
      - name: mfg.device.stroke_count
        type: counter
        unit: strokes
        range: [0, 1000]
        drift: 2
      - name: mfg.device.die_temperature_c
        type: gauge
        unit: C
        range: [20, 250]
        drift: 2
      - name: mfg.device.hydraulic_pressure_bar
        type: gauge
        unit: bar
        range: [50, 300]
        drift: 5
      - name: mfg.device.alignment_offset_mm
        type: gauge
        unit: mm
        range: [0, 0.5]
        drift: 0.01

  quality_systems:
    ip_base: '10.201'
    line_pool:
    - Quality-Control
    - Assembly-1
    - Assembly-2
    devices:
    - type: vision_inspector
      manufacturer: Cognex
      model: Insight 2800
      firmware: 9.4.2
      count: 12
      metrics:
      - name: mfg.device.inspection_rate_per_min
        type: gauge
        unit: /min
        range: [10, 200]
        drift: 5
      - name: mfg.device.defect_rate_ppm
        type: gauge
        unit: ppm
        range: [0, 5000]
        drift: 100
      - name: mfg.device.false_reject_pct
        type: gauge
        unit: '%'
        range: [0, 5]
        drift: 0.1
      - name: mfg.device.image_capture_ms
        type: gauge
        unit: ms
        range: [10, 200]
        drift: 3
      - name: mfg.device.model_confidence_pct
        type: gauge
        unit: '%'
        range: [80, 100]
        drift: 0.5
    - type: cmm_station
      manufacturer: Zeiss
      model: CONTURA
      firmware: 7.5.0
      count: 6
      metrics:
      - name: mfg.device.measurement_cycle_sec
        type: gauge
        unit: s
        range: [30, 600]
        drift: 10
      - name: mfg.device.deviation_um
        type: gauge
        unit: um
        range: [0, 50]
        drift: 1
      - name: mfg.device.probe_wear_pct
        type: gauge
        unit: '%'
        range: [0, 100]
        drift: 0.3
      - name: mfg.device.calibration_drift_um
        type: gauge
        unit: um
        range: [0, 10]
        drift: 0.2
    - type: laser_scanner
      manufacturer: Keyence
      model: LJ-X8300
      firmware: 3.11.3
      count: 10
      metrics:
      - name: mfg.device.scan_rate_hz
        type: gauge
        unit: Hz
        range: [100, 5000]
        drift: 50
      - name: mfg.device.point_cloud_density
        type: gauge
        unit: points/cm2
        range: [100, 10000]
        drift: 100
      - name: mfg.device.surface_roughness_um
        type: gauge
        unit: um
        range: [0.1, 10]
        drift: 0.2
      - name: mfg.device.measurement_accuracy_um
        type: gauge
        unit: um
        range: [0.5, 20]
        drift: 0.3

  environmental_systems:
    ip_base: '10.202'
    devices:
    - type: cleanroom_controller
      manufacturer: Honeywell
      model: ACM-3000
      firmware: 5.1.2
      count: 8
      metrics:
      - name: mfg.device.particle_count_per_m3
        type: gauge
        unit: particles/m3
        range: [0, 100000]
        drift: 1000
      - name: mfg.device.temperature_c
        type: gauge
        unit: C
        range: [18, 24]
        drift: 0.2
      - name: mfg.device.humidity_pct
        type: gauge
        unit: '%'
        range: [30, 70]
        drift: 1
      - name: mfg.device.differential_pressure_pa
        type: gauge
        unit: Pa
        range: [5, 25]
        drift: 0.5
      - name: mfg.device.air_changes_per_hour
        type: gauge
        unit: ach
        range: [10, 60]
        drift: 1
    - type: hvac_unit
      manufacturer: Trane
      model: Sintesis
      firmware: 2.8.4
      count: 12
      metrics:
      - name: mfg.device.supply_temp_c
        type: gauge
        unit: C
        range: [10, 25]
        drift: 0.5
      - name: mfg.device.return_temp_c
        type: gauge
        unit: C
        range: [18, 28]
        drift: 0.5
      - name: mfg.device.flow_rate_cfm
        type: gauge
        unit: cfm
        range: [500, 10000]
        drift: 100
      - name: mfg.device.filter_dp_pa
        type: gauge
        unit: Pa
        range: [50, 500]
        drift: 5
      - name: mfg.device.energy_kwh
        type: counter
        unit: kWh
        range: [0, 50]
        drift: 0.5
    - type: safety_sensor
      manufacturer: Sick
      model: SafetyLiDAR
      firmware: 1.4.0
      count: 40
      metrics:
      - name: mfg.device.light_curtain_status
        type: gauge
        unit: status
        range: [0, 1]
        drift: 0.02
      - name: mfg.device.emergency_stop_events
        type: counter
        unit: events
        range: [0, 1]
        drift: 0.01
      - name: mfg.device.gas_level_ppm
        type: gauge
        unit: ppm
        range: [0, 100]
        drift: 1
      - name: mfg.device.noise_level_db
        type: gauge
        unit: dB
        range: [40, 110]
        drift: 2

  logistics:
    ip_base: '10.203'
    devices:
    - type: agv
      manufacturer: MiR
      model: 250 Hook
      firmware: 4.14.1
      count: 25
      battery_powered: true
      metrics:
      - name: mfg.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: mfg.device.speed_m_s
        type: gauge
        unit: m/s
        range: [0, 2]
        drift: 0.1
      - name: mfg.device.position_accuracy_cm
        type: gauge
        unit: cm
        range: [0, 20]
        drift: 1
      - name: mfg.device.obstacle_events
        type: counter
        unit: events
        range: [0, 5]
        drift: 0.1
      - name: mfg.device.trips_completed
        type: counter
        unit: trips
        range: [0, 100]
        drift: 1
      - name: mfg.device.load_weight_kg
        type: gauge
        unit: kg
        range: [0, 250]
        drift: 5
    - type: warehouse_scanner
      manufacturer: Zebra
      model: DS3680
      firmware: 2.21.4
      count: 15
      metrics:
      - name: mfg.device.scans_per_min
        type: gauge
        unit: /min
        range: [10, 100]
        drift: 3
      - name: mfg.device.read_rate_pct
        type: gauge
        unit: '%'
        range: [85, 100]
        drift: 0.3
      - name: mfg.device.queue_depth
        type: gauge
        unit: items
        range: [0, 100]
        drift: 2
      - name: mfg.device.wms_sync_lag_ms
        type: gauge
        unit: ms
        range: [10, 5000]
        drift: 50

pinned_devices:
  # Primary demo story devices on Assembly-1, Plant-A-Detroit
  - device_type: plc_controller
    plant: Plant-A-Detroit
    line: Assembly-1
  - device_type: robot_arm
    plant: Plant-A-Detroit
    line: Assembly-1
  - device_type: conveyor_system
    plant: Plant-A-Detroit
    line: Assembly-1

services:
- name: mes-platform
  host: mes-app-01
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/workorders/create"
    latency_base_ms: 80
    latency_p99_ms: 400
    error_rate: 0.015
  - name: "GET /api/lines/schedule"
    latency_base_ms: 50
    latency_p99_ms: 220
    error_rate: 0.01
  - name: "POST /api/production/track"
    latency_base_ms: 60
    latency_p99_ms: 280
    error_rate: 0.012
  - name: "GET /api/workorders/status"
    latency_base_ms: 40
    latency_p99_ms: 180
    error_rate: 0.008
  dependencies:
  - service: scada-gateway
    operation: "GET /api/devices/telemetry"
    probability: 0.5
  - service: erp-integration-bridge
    operation: "POST /api/sap/orders/sync"
    probability: 0.3
  - service: quality-management-system
    operation: "POST /api/spc/sample"
    probability: 0.25

- name: scada-gateway
  host: scada-gw-01
  language: cpp
  framework: Boost.Asio
  operations:
  - name: "POST /api/telemetry/ingest"
    latency_base_ms: 12
    latency_p99_ms: 60
    error_rate: 0.004
  - name: "GET /api/devices/telemetry"
    latency_base_ms: 18
    latency_p99_ms: 90
    error_rate: 0.006
  - name: "POST /api/alarms/raise"
    latency_base_ms: 25
    latency_p99_ms: 120
    error_rate: 0.01
  - name: "POST /api/historian/write"
    latency_base_ms: 30
    latency_p99_ms: 150
    error_rate: 0.008

- name: quality-management-system
  host: qms-app-01
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/spc/sample"
    latency_base_ms: 55
    latency_p99_ms: 240
    error_rate: 0.012
  - name: "POST /api/ncr/create"
    latency_base_ms: 90
    latency_p99_ms: 420
    error_rate: 0.02
  - name: "GET /api/capa/open"
    latency_base_ms: 45
    latency_p99_ms: 200
    error_rate: 0.01
  - name: "POST /api/vision/inspect"
    latency_base_ms: 110
    latency_p99_ms: 500
    error_rate: 0.025
  dependencies:
  - service: scada-gateway
    operation: "GET /api/devices/telemetry"
    probability: 0.4

- name: predictive-maintenance-api
  host: predmaint-ml-01
  language: python
  framework: FastAPI
  operations:
  - name: "POST /api/predict/rul"
    latency_base_ms: 180
    latency_p99_ms: 850
    error_rate: 0.02
  - name: "GET /api/maintenance/schedule"
    latency_base_ms: 70
    latency_p99_ms: 320
    error_rate: 0.012
  - name: "POST /api/anomaly/score"
    latency_base_ms: 130
    latency_p99_ms: 600
    error_rate: 0.025
  dependencies:
  - service: scada-gateway
    operation: "GET /api/devices/telemetry"
    probability: 0.7

- name: supply-chain-tracker
  host: scm-app-01
  language: dotnet
  framework: ".NET 8"
  operations:
  - name: "GET /api/inventory/levels"
    latency_base_ms: 50
    latency_p99_ms: 220
    error_rate: 0.01
  - name: "POST /api/jit/dispatch"
    latency_base_ms: 95
    latency_p99_ms: 450
    error_rate: 0.022
  - name: "GET /api/agv/fleet/status"
    latency_base_ms: 35
    latency_p99_ms: 160
    error_rate: 0.008
  - name: "POST /api/suppliers/notify"
    latency_base_ms: 140
    latency_p99_ms: 700
    error_rate: 0.03
  dependencies:
  - service: erp-integration-bridge
    operation: "POST /api/sap/bom/sync"
    probability: 0.35

- name: erp-integration-bridge
  host: erp-bridge-01
  language: java
  framework: SAP JCo
  operations:
  - name: "POST /api/sap/orders/sync"
    latency_base_ms: 220
    latency_p99_ms: 1100
    error_rate: 0.03
  - name: "POST /api/sap/bom/sync"
    latency_base_ms: 280
    latency_p99_ms: 1400
    error_rate: 0.035
  - name: "POST /api/sap/finance/export"
    latency_base_ms: 320
    latency_p99_ms: 1600
    error_rate: 0.04

- name: energy-management-system
  host: ems-app-01
  language: python
  framework: FastAPI
  operations:
  - name: "POST /api/grid/sample"
    latency_base_ms: 25
    latency_p99_ms: 110
    error_rate: 0.008
  - name: "GET /api/demand/forecast"
    latency_base_ms: 80
    latency_p99_ms: 380
    error_rate: 0.015
  - name: "POST /api/hvac/optimize"
    latency_base_ms: 100
    latency_p99_ms: 450
    error_rate: 0.018
  - name: "GET /api/carbon/footprint"
    latency_base_ms: 60
    latency_p99_ms: 280
    error_rate: 0.012

- name: digital-twin-engine
  host: dtwin-sim-01
  language: python
  framework: FastAPI
  operations:
  - name: "POST /api/simulate/run"
    latency_base_ms: 200
    latency_p99_ms: 950
    error_rate: 0.025
  - name: "POST /api/whatif/analyze"
    latency_base_ms: 240
    latency_p99_ms: 1200
    error_rate: 0.03
  - name: "GET /api/twin/state"
    latency_base_ms: 45
    latency_p99_ms: 200
    error_rate: 0.01
  dependencies:
  - service: scada-gateway
    operation: "GET /api/devices/telemetry"
    probability: 0.6
