workflows:

  - name: "[Healthcare/Quest] HL7 Engine Config Rollback & Recovery"
    description: "Self-heal for the HL7 integration engine bad-config cascade. Rolls back to the prior config version via the Rhapsody admin API, waits for outbound queue to drain, verifies LIMS results-pending backlog clears, and notifies integration ops."
    trigger:
      type: monitor
      monitor_tags:
        - "incident_domain:diagnostic-laboratory"
        - "signal_chain:1-root-cause"
    steps:

      - name: gather_context
        type: datadog_query
        description: "Capture current outbound queue depth, NACK rate, and config version per engine node."
        parameters:
          query: "max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine} by {device_id}"

      - name: pause_outbound_routes
        type: http_request
        description: "Pause outbound routes on the affected engine cluster so retries do not stack while we roll back."
        parameters:
          method: POST
          url: "https://hl7-engine.quest.internal/admin/routes/outbound/pause"
          headers:
            X-Auth-Token: "{{vault.hl7_admin_token}}"
            Content-Type: "application/json"
          body:
            cluster: "primary"
            reason: "auto-remediation: bad config cascade"

      - name: rollback_config
        type: http_request
        description: "Roll the HL7 engine route map to the previous config version."
        parameters:
          method: POST
          url: "https://hl7-engine.quest.internal/admin/config/rollback"
          headers:
            X-Auth-Token: "{{vault.hl7_admin_token}}"
            Content-Type: "application/json"
          body:
            target_version: "previous"
            confirm_reload: true

      - name: wait_for_reload
        type: sleep
        description: "Allow ~60s for cluster reload and worker thread reinitialization."
        parameters:
          duration_seconds: 60

      - name: resume_outbound_routes
        type: http_request
        description: "Resume outbound routes."
        parameters:
          method: POST
          url: "https://hl7-engine.quest.internal/admin/routes/outbound/resume"
          headers:
            X-Auth-Token: "{{vault.hl7_admin_token}}"
            Content-Type: "application/json"

      - name: wait_for_queue_drain
        type: sleep
        description: "Allow ~120s for the outbound queue to drain post-rollback."
        parameters:
          duration_seconds: 120

      - name: verify_queue_recovered
        type: datadog_query
        description: "Verify outbound queue has drained below the cascade threshold."
        parameters:
          query: "avg(last_5m):max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine} < 800"

      - name: verify_lims_backlog_drained
        type: datadog_query
        description: "Verify LIMS results-pending-delivery backlog cleared."
        parameters:
          query: "avg(last_5m):max:hospital.lims.results_pending_delivery{device_type:lims_app_server} < 400"

      - name: notify_integration_ops
        type: slack_message
        description: "Notify the integration ops channel that the rollback succeeded."
        parameters:
          channel: "#lab-integration-ops"
          message: "✅ HL7 engine config rolled back. Outbound queue + LIMS results-pending backlog drained. File an incident retrospective on the failed config push."

      - name: open_change_review_ticket
        type: http_request
        description: "Open a change-review ticket for the failed HL7 engine config push so the routing rule fix can be re-deployed under scrutiny."
        parameters:
          method: POST
          url: "https://servicenow.quest.internal/api/change/tickets"
          headers:
            Authorization: "Bearer {{vault.servicenow_token}}"
            Content-Type: "application/json"
          body:
            category: "Integration"
            severity: "P2"
            summary: "HL7 engine routing config push caused result-delivery cascade"

    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:integration"
      - "incident_domain:diagnostic-laboratory"
      - "workflow-type:auto-remediation"

  - name: "[Healthcare/Quest] Specimen Refrigeration Capacity Stop-Gap"
    description: "When refrigerated specimen storage approaches 90% capacity, divert in-flight courier routes to an overflow site and notify the lab manager. Buys ~30 min while the upstream backlog is resolved."
    trigger:
      type: monitor
      monitor_tags:
        - "incident_domain:diagnostic-laboratory"
        - "signal_chain:4-cascade"
    steps:

      - name: identify_at_risk_storage
        type: datadog_query
        description: "Find refrigerator units crossing the capacity threshold."
        parameters:
          query: "max:hospital.specimen.refrigerated_capacity_pct{device_type:refrigerated_storage} by {device_id}"

      - name: divert_courier_routes
        type: http_request
        description: "Tell courier dispatch to divert pickups to the regional overflow site for 30 minutes."
        parameters:
          method: POST
          url: "https://courier-dispatch.quest.internal/api/routes/divert"
          headers:
            Authorization: "Bearer {{vault.courier_dispatch_token}}"
            Content-Type: "application/json"
          body:
            destination: "overflow-site-east"
            ttl_minutes: 30
            reason: "primary lab refrigerator capacity"

      - name: notify_lab_manager
        type: slack_message
        description: "Page the on-shift lab manager so they can prioritize specimen processing."
        parameters:
          channel: "#lab-ops-day-shift"
          message: "🧊 Refrigerated specimen storage >90%. Courier routes diverted to overflow for 30min. Please prioritize accessioning queue."

    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:operations"
      - "incident_domain:diagnostic-laboratory"
      - "workflow-type:stop-gap"

  - name: "[Healthcare/Quest] Reagent Lot Auto-Quarantine"
    description: "When fleet-wide analyzer QC failure rate exceeds the CLIA threshold, identify the common reagent lot, mark it quarantined in reagent-inventory-api, and notify lab operations."
    trigger:
      type: monitor
      monitor_tags:
        - "compliance:clia"
        - "incident_domain:diagnostic-laboratory"
    steps:

      - name: identify_failing_lot
        type: datadog_query
        description: "Pull reagent lot age + QC failure count grouped by analyzer."
        parameters:
          query: "sum:hospital.analyzer.qc_fail_total{device_category:clinical_lab_automation} by {device_id}"

      - name: quarantine_lot
        type: http_request
        description: "Flag the suspect lot in reagent-inventory-api so subsequent runs are rejected until the lot is reviewed."
        parameters:
          method: POST
          url: "https://reagent-inv.quest.internal/api/reagents/qc-flag"
          headers:
            Authorization: "Bearer {{vault.reagent_inv_token}}"
            Content-Type: "application/json"
          body:
            action: "quarantine"
            reason: "auto: fleet QC failure rate >CLIA threshold"

      - name: notify_lab_operations
        type: slack_message
        description: "Notify lab operations of the auto-quarantine and the affected analyzer list."
        parameters:
          channel: "#lab-operations"
          message: "🧪 Reagent lot auto-quarantined after fleet-wide QC failure spike. Switch to backup lot and document in CLIA logbook."

    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:operations"
      - "compliance:clia"
      - "compliance:cap"
      - "workflow-type:auto-remediation"
