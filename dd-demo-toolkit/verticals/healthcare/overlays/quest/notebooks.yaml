notebooks:

  - id: "quest-lab-integration-cascade-rca"
    name: "🧪 Quest Diagnostics — HL7 Engine Config Cascade RCA"
    type: investigation
    description: "Symptom: ordering providers report stale results in the portal; STAT TAT SLO is burning fast. Root cause: a bad routing-rule config push to the HL7 integration engine NACKs valid ORU^R01 messages, saturates worker threads, and grows the outbound queue past 10k. Back-pressure surfaces in LIMS (results pending, db pool, HL7 write failures) → pre-analytic specimen queues grow → refrigerated storage approaches capacity → contracted TAT commitments breach. This notebook walks the cascade the way Bits AI SRE narrows it down, EXPLAINS WHERE EACH METRIC ACTUALLY COMES FROM (so the customer can answer 'how would we get this into Datadog?'), disambiguates from the WiFi and BD cascades, and closes with quantified ROI."
    time_range: "1h"
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:integration"
      - "incident_domain:diagnostic-laboratory"
      - "signal_chain_root:hl7-config-push"
    cells:

      # =====================================================
      # PROLOGUE — symptom + data-sourcing model
      # =====================================================
      - attributes:
          definition:
            type: "markdown"
            text: |
              # Quest Diagnostics — HL7 Integration Engine Config Cascade

              ## Symptom report

              Provider-experience pages at **08:14 local**:

              > *"Several large ordering-provider customers are calling: 'we
              > placed STAT orders this morning, the specimens arrived at
              > your lab, but our EHR is still showing the orders as
              > pending. The provider portal is also showing some results
              > as stale.' STAT TAT SLO has burned 18% of its 30-day
              > budget in the last hour."*

              ## Where to look first?

              The intuitive answer: "the lab is slow." The lab is **not**
              slow. Chemistry analyzers, hematology, and PCR are running
              at normal throughput. Specimens are being collected and
              accessioned. **Results are being verified inside LIMS on
              schedule.** What is happening is one layer further out —
              the system that *delivers* results to ordering providers
              has stopped functioning correctly. This notebook walks
              upstream of the symptom to find the actual fault and
              demonstrates how Bits AI SRE narrows it down in under
              two minutes.

              ---
              ## ⚠️ How to read this notebook — the data-sourcing map

              Before chasing graphs, anchor on **where each metric below
              actually originates** in a real Quest environment, and on
              the **effort level** to get it into Datadog. This is the
              answer to "how would we get this data into Datadog?" that
              every customer asks within the first 10 minutes of a demo.
              If you cannot answer it on the whiteboard, the rest of the
              conversation falls apart.

              Metrics fall into three tiers by instrumentation effort:

              ### Tier 1 — Native (auto-collected)
              The Datadog Agent or APM tracer surfaces these out of the
              box once installed on the host. No application code change.

              | Metric                                          | Source                                                       |
              |-------------------------------------------------|--------------------------------------------------------------|
              | `hospital.hl7.ack_received_total`               | HL7 engine native counter (JMX/REST). Rhapsody, Mirth, Cloverleaf all expose this. |
              | `hospital.hl7.nack_received_total`              | HL7 engine native counter (ACK code = AE/AR in the MSA segment). |
              | `hospital.hl7.messages_sent_total`              | HL7 engine native counter, per route.                        |
              | `hospital.hl7.messages_delivered_total`         | HL7 engine native counter, per route.                        |
              | `hospital.hl7.outbound_queue_depth`             | HL7 engine native gauge — first-class metric on every major engine. |
              | `hospital.hl7.worker_thread_utilization_pct`   | JVM/.NET thread-pool stats via JMX or APM runtime metrics.   |
              | `hospital.hl7.routing_errors_total`             | HL7 engine native error counter.                             |
              | `hospital.lims.db_pool_active`                  | APM runtime metric (DB connection pool).                     |
              | `hospital.app.requests_total`, `.errors_total`, `.latency_ms` | APM tracer auto-instrumentation (Java / .NET / Go / Python / Swift). |
              | `hospital.device.cpu_usage_pct`, `.memory_usage_pct`, `.online` | Datadog Agent on the host (LIMS / HL7 engine / portal servers). |
              | `hospital.specimen.refrigerator_temp_celsius`, `.refrigerated_capacity_pct`, `.stability_*`, `.door_open_events_total` | Cold-chain IoT (Sensitech / Berlinger / Cooper-Atkins). CAP + CDC mandate this; real devices ship native telemetry today. Direct OTel push or Agent integration. |

              ### Tier 2 — Custom business metric (DogStatsD from app code)
              These require ~10 lines of code added at well-defined hook
              points in the application — standard pattern in every shop
              that does observability seriously. They live in LIMS (the
              system of record) or in the integration engine's transform
              scripts.

              | Metric                                          | Where the DogStatsD call goes                                |
              |-------------------------------------------------|--------------------------------------------------------------|
              | `hospital.lims.orders_received_total`           | LIMS order-ingest endpoint (counter on every accepted order).|
              | `hospital.lims.results_verified_total`          | LIMS result-verification path (counter on every verify).     |
              | `hospital.lims.results_pending_delivery`        | LIMS sweeper job (gauge — `SELECT count(*) FROM results WHERE status='verified' AND hl7_sent_at IS NULL`). |
              | `hospital.lims.hl7_writes_failed_total`         | LIMS HL7-write catch-block (counter on exception).           |
              | `hospital.lims.qc_evaluations_total`            | LIMS QC service-call wrapper (counter per evaluation).       |
              | `hospital.tat.routine_orders_completed_total` / `.stat_orders_completed_total` | LIMS at verify-time — counter on every completed order, partitioned by priority. |
              | `hospital.tat.routine_orders_within_target_total` / `.stat_orders_within_target_total` | LIMS at verify-time — counter when `verified_time − accession_time` ≤ contracted TAT. |
              | `hospital.tat.routine_breaches_total` / `.stat_breaches_total` | LIMS at verify-time — counter when the threshold is missed. Numerator + denominator pairs make SLOs count-over-count (no percentiles needed). |
              | `hospital.tat.stat_in_flight_count` / `.routine_in_flight_count` | LIMS sweeper job (gauge of currently-pending orders).       |
              | `hospital.specimen.queue_depth_pre_analytic`, `.queue_depth_analytic` | Pre-analytic automation line (Inpeco / Roche CCM / Beckman) — vendor REST or PLC SCADA scrape via custom Agent check. Modern lines support it; older standalone centrifuges don't. |
              | `hospital.specimen.processed_total`, `.sorter_misroutes_total`, `.stability_breaches_total` | Automation line counters via same vendor REST/SCADA scrape. |

              ### Tier 3 — Wired-from-pipeline (deliberate plumbing)
              Not native, not as simple as a single DogStatsD increment.
              These need a deploy-pipeline hook, an admin-API scrape, or
              a custom check polling vendor middleware.

              | Metric                                          | Implementation                                               |
              |-------------------------------------------------|--------------------------------------------------------------|
              | `hospital.hl7.config_version`                   | Emitted by the **CD pipeline** (Jenkins / Spinnaker / Argo) on every promotion of the HL7 routing config. Datadog [Change Tracking](https://docs.datadoghq.com/change_tracking/) auto-correlates against downstream metrics for 15 min post-deploy — this is what makes the smoking-gun "config-version step → routing errors" pattern light up automatically. |
              | `hospital.hl7.worker_thread_retries_total`      | Engine-dependent. Rhapsody: JMX `RetryCount` bean. Mirth: needs custom logging + log-based metric. |
              | `hospital.analyzer.tests_completed_total`, `.qc_pass_total`, `.qc_fail_total`, `.test_requeue_rate_pct` | **Source of truth is LIMS**, not the analyzer. Analyzers are vendor-locked appliances; their state reaches Datadog via instrument middleware (Data Innovations IM / Roche cobas IT / Abbott AlinIQ) → LIMS. LIMS then emits these counters tagged with the originating `analyzer_id` so dashboards can group by instrument while the metric origin stays consistent. |
              | `hospital.analyzer.calibration_age_hr`, `.reagent_lot_age_days`, `.reagent_inventory_pct` | Periodic poll (every 5–15 min) of vendor middleware admin API or DB → custom Agent check. Quest already runs this kind of integration for compliance / inventory reporting. |
              | `hospital.analyzer.module_status_ok`            | Same path as above — instrument middleware exposes per-module health via API. |
              | `hospital.courier.in_transit_specimens`, `.pickups_completed_total`, `.pickup_delays_total`, `.route_progress_pct` | Courier dispatch SaaS (MercuryGate / Onfleet / in-house) — webhook-driven or 1-min poll → DogStatsD on the dispatch service. Driver-app RUM optional add-on. |

              **The headline:** every metric in this notebook comes from
              **software Quest owns and operates**, in one of these three
              tiers. The lab instruments themselves (cobas, Architect,
              Sysmex, PCR boxes) are vendor-locked appliances that do not
              natively emit Prom/OTel — but their state reaches Datadog
              *via the middleware Quest already runs in front of them*,
              the same way every other large reference lab does it. No
              "magic IoT" required: it is the same APM + DogStatsD +
              cold-chain-IoT + middleware-scrape mix Quest is already
              running today, just wired into Datadog.

              ---
              ## Step 1 — Confirm the symptom

              STAT TAT breach counters are the customer-facing punch
              line. They originate in LIMS at result-verification time
              and are the most direct measurement of the contractual
              commitment Quest makes to ordering providers.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "stat"
                    query: "sum:hospital.tat.stat_breaches_total{device_type:lims_app_server}.as_count()"
                  - data_source: "metrics"
                    name: "routine"
                    query: "sum:hospital.tat.routine_breaches_total{device_type:lims_app_server}.as_count()"
                formulas:
                  - formula: "stat"
                    alias: "STAT TAT breaches"
                  - formula: "routine"
                    alias: "Routine TAT breaches"
                display_type: "bars"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              STAT and routine TAT breach counters both ticked up.
              The symptom is real and the customers are not imagining
              it. Now — **which subsystem caused this?**

              ---
              ## Step 2 — Are we lab-slow, or delivery-slow?

              Two questions to disambiguate fast. If the **lab** is
              slow, we will see it in analyzer throughput and pre-analytic
              queues *first*. If we are **delivery**-slow, we will see
              results piling up *after* verification, with the analyzers
              still humming along.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "completed"
                    query: "sum:hospital.analyzer.tests_completed_total{device_category:clinical_lab_automation}.as_count()"
                  - data_source: "metrics"
                    name: "verified"
                    query: "sum:hospital.lims.results_verified_total{device_type:lims_app_server}.as_count()"
                formulas:
                  - formula: "completed"
                    alias: "Analyzer tests completed"
                  - formula: "verified"
                    alias: "LIMS results verified"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Analyzers are fine. LIMS verification is fine.** Throughput
              is on baseline. So the *production* side of the lab is
              healthy. The fault is downstream — in the **delivery** path
              from LIMS to ordering providers.

              ---
              ## Step 3 — Walk to the delivery path: HL7 outbound queue

              All result delivery to ordering provider EHRs flows through
              the HL7 integration engine via outbound ORU^R01 messages.
              If delivery is broken, that queue is the single most useful
              signal in the entire stack.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "avgq"
                    query: "avg:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine} by {device_id}"
                  - data_source: "metrics"
                    name: "maxq"
                    query: "max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine}"
                formulas:
                  - formula: "avgq"
                    alias: "Outbound queue (per node)"
                  - formula: "maxq"
                    alias: "Outbound queue (worst node)"
                display_type: "line"
            markers:
              - value: "y = 800"
                display_type: "warning dashed"
                label: "Warning"
              - value: "y = 4000"
                display_type: "error dashed"
                label: "Cascade threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Smoking gun.** Outbound queue depth jumps from a ~100
              baseline to >8,000 within minutes. Delivery is the
              bottleneck.

              Two follow-up questions Bits AI SRE asks next:

              1. *Are messages being rejected (NACK) or just not being
                 sent fast enough?*
              2. *What changed on the engine right before this started?*
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "sent"
                    query: "sum:hospital.hl7.messages_sent_total{device_type:hl7_integration_engine}.as_count()"
                  - data_source: "metrics"
                    name: "ack"
                    query: "sum:hospital.hl7.ack_received_total{device_type:hl7_integration_engine}.as_count()"
                  - data_source: "metrics"
                    name: "nack"
                    query: "sum:hospital.hl7.nack_received_total{device_type:hl7_integration_engine}.as_count()"
                formulas:
                  - formula: "sent"
                    alias: "Sent"
                  - formula: "ack"
                    alias: "ACKed"
                  - formula: "nack"
                    alias: "NACKed"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Messages are being sent. They are being NACKed by the
              receiving EHRs at a high rate.** That means the messages
              themselves are malformed — the EHRs are receiving
              something they cannot parse and rejecting it. This is not
              a network outage or a capacity issue; this is a **content
              problem** on the outbound side.

              And what shapes the outbound content? The routing-rule
              config.

              ---
              ## Step 4 — What changed? The config-version signal

              `hospital.hl7.config_version` is a gauge that the engine
              increments every time a new route map is loaded. Each
              integer corresponds to a tracked deploy in change
              management.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "cfg"
                    query: "max:hospital.hl7.config_version{device_type:hl7_integration_engine}"
                  - data_source: "metrics"
                    name: "errs"
                    query: "sum:hospital.hl7.routing_errors_total{device_type:hl7_integration_engine}.as_count()"
                formulas:
                  - formula: "cfg"
                    alias: "Config version"
                  - formula: "errs"
                    alias: "Routing errors (count)"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **There it is.** A config-version increment **immediately
              before** routing errors started accumulating. The new
              route map is malformed — it is producing outputs the
              receiving EHRs reject.

              This is the kind of correlation Bits AI SRE flags
              automatically when it walks the metric graph back from the
              symptom. Two metrics, one timestamp, root cause.

              ---
              ## Step 5 — Confirm the back-pressure cascade

              If the diagnosis is correct, we should see back-pressure
              propagate **inward** from the HL7 engine through LIMS
              into pre-analytic and refrigerated storage. Each layer
              should show a clear time-lagged response.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "queue"
                    query: "max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine}"
                  - data_source: "metrics"
                    name: "pending"
                    query: "max:hospital.lims.results_pending_delivery{device_type:lims_app_server}"
                  - data_source: "metrics"
                    name: "writes_failed"
                    query: "sum:hospital.lims.hl7_writes_failed_total{device_type:lims_app_server}.as_count()"
                formulas:
                  - formula: "queue"
                    alias: "HL7 outbound queue"
                  - formula: "pending"
                    alias: "LIMS results pending delivery"
                  - formula: "writes_failed"
                    alias: "LIMS HL7 write failures"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Cascade confirmed.  HL7 queue grows first, **then** LIMS
              results-pending-delivery grows, **then** LIMS HL7 write
              failures spike as LIMS gives up retrying. The lag between
              the three signals is typically 30–60 seconds — exactly
              the time it takes for LIMS connection retries to time
              out and surface as failures.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "pool"
                    query: "max:hospital.lims.db_pool_active{device_type:lims_app_server} by {device_id}"
                formulas:
                  - formula: "pool"
                    alias: "LIMS DB pool active"
                display_type: "area"
            markers:
              - value: "y = 200"
                display_type: "error dashed"
                label: "Pool capacity"
              - value: "y = 180"
                display_type: "warning dashed"
                label: "90% utilized"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              LIMS DB connection pool saturates as result-delivery
              retries pile up — confirms LIMS is feeling back-pressure
              from the broken outbound path. New order acceptance
              latency will start to slip next, which is the upstream
              effect on the *lab* itself.

              ---
              ## Step 6 — Specimen-side effects (the operations view)

              Once LIMS slows down accepting new orders, specimens
              physically pile up at accessioning. The pre-analytic
              centrifuge queue is the operational symptom. Refrigerated
              storage capacity follows.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "preq"
                    query: "max:hospital.specimen.queue_depth_pre_analytic{device_type:centrifuge}"
                  - data_source: "metrics"
                    name: "anq"
                    query: "max:hospital.specimen.queue_depth_analytic{device_type:specimen_sorter}"
                formulas:
                  - formula: "preq"
                    alias: "Pre-analytic queue (worst centrifuge)"
                  - formula: "anq"
                    alias: "Analytic queue (worst sorter)"
                display_type: "line"
            markers:
              - value: "y = 180"
                display_type: "error dashed"
                label: "Pre-analytic critical"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "cap"
                    query: "max:hospital.specimen.refrigerated_capacity_pct{device_type:refrigerated_storage}"
                  - data_source: "metrics"
                    name: "stab"
                    query: "min:hospital.specimen.stability_min_remaining{device_type:refrigerated_storage}"
                formulas:
                  - formula: "cap"
                    alias: "Refrigerated capacity % (worst unit)"
                  - formula: "stab"
                    alias: "Stability min remaining (worst-case specimen)"
                display_type: "line"
            markers:
              - value: "y = 90"
                display_type: "error dashed"
                label: "Capacity critical"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Patient-safety dimension surfaces.** Pre-analytic queue
              past 180; one refrigerator past 90% capacity; worst-case
              specimen has ~40 minutes of stability remaining. If the
              cascade is not resolved soon, specimens will require
              **re-collection** — which means recalling patients, a
              regulatory event under CAP recordkeeping, and a hard
              customer-trust event with the ordering providers.

              ---
              ## Step 7 — Why this is NOT the WiFi cascade or the BD cascade

              Three Bits-AI-SRE-friendly stories live in this hospital.
              They are intentionally disjoint so the AI does not mix
              their signals. Quick disambiguation table:

              | Signal                                   | WiFi cascade (base healthcare) | BD Pyxis cascade (overlay)  | **Quest cascade (this notebook)** |
              |------------------------------------------|--------------------------------|------------------------------|-----------------------------------|
              | `device_type` filter                     | wireless_ap, infusion_pump     | pyxis_medstation             | **hl7_integration_engine, lims_app_server, centrifuge, refrigerated_storage** |
              | Department                               | ED / ICU                       | Pharmacy                     | **Lab**                           |
              | Floor / Wing                             | 3 / East                       | (all floors) / (all wings) Pharmacy | **2 / West** Lab           |
              | `incident_domain` tag                    | network-to-device              | pharmacy-automation          | **diagnostic-laboratory**         |
              | Root-cause metric                        | `hospital.network.channel_utilization_pct` | `hospital.pyxis.inventory_poll_rate_per_min` | **`hospital.hl7.routing_errors_total` + `hospital.hl7.config_version`** |
              | Customer-facing punch line               | Pumps offline → patient safety | Nurse dispense delay → DEA risk | **Provider TAT breach → contract risk** |

              Filtering by `incident_domain:diagnostic-laboratory` (or by
              any `hl7_integration_engine` / `lims_app_server` /
              `centrifuge` / `refrigerated_storage` device type) yields a
              clean signal chain with zero overlap from the other
              stories. Bits AI SRE keeps the three narratives separate
              automatically.

              ---
              ## Step 8 — Remediation

              The self-heal workflow
              `[Healthcare/Quest] HL7 Engine Config Rollback & Recovery`
              executes a six-step recovery:

              1. **Pause outbound routes** on the engine cluster so
                 retries do not stack while we roll back.
              2. **Rollback config** to the previous tracked route map
                 via the Rhapsody admin API.
              3. **Resume outbound routes** post-reload.
              4. **Wait for the queue to drain** (~120s for a typical
                 4–10k message backlog).
              5. **Verify recovery** on both the engine queue depth and
                 the LIMS results-pending backlog.
              6. **Notify integration ops** + **open a change-review
                 ticket** in ServiceNow so the fixed routing rule is
                 re-deployed under canary scrutiny.

              Watch the recovery:
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "queue"
                    query: "max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine}"
                  - data_source: "metrics"
                    name: "pending"
                    query: "max:hospital.lims.results_pending_delivery{device_type:lims_app_server}"
                  - data_source: "metrics"
                    name: "wt"
                    query: "avg:hospital.hl7.worker_thread_utilization_pct{device_type:hl7_integration_engine}"
                formulas:
                  - formula: "queue"
                    alias: "HL7 outbound queue"
                  - formula: "pending"
                    alias: "LIMS results pending delivery"
                  - formula: "wt"
                    alias: "Worker thread util %"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Within ~3 minutes of the rollback, the outbound queue
              drains, LIMS results-pending falls back to baseline, and
              the worker thread pool returns to normal headroom. The
              pre-analytic queue and refrigerator capacity recover
              over the following 10–15 minutes as the operational
              backlog clears.

              ---
              # 💰 Business Impact & ROI

              The cascade above looks technical, but **every minute of
              degradation translates directly into Quest's commercial
              and clinical-safety obligations**. This is why the
              observability layer is not a "nice to have" — it pays
              for itself the first time it prevents a contracted-TAT
              breach event.

              ## What just happened, in operations terms

              - **Affected scope:** every ordering-provider customer of
                this lab (typically 800–2,500 contracted clinics /
                hospitals / IDNs per Quest regional hub)
              - **Cascade duration if undetected (manual MTTR):** 45–90
                minutes (the integration team has to be paged, has to
                triage which subsystem broke, has to verify it was the
                config push and not a coincident HL7 EHR-side outage,
                and finally has to roll back manually).
              - **Cascade duration with Datadog auto-remediation:**
                **<5 minutes** end-to-end (detect → root-cause →
                pause → rollback → verify → notify).

              ## ROI math — single incident

              | Lever                              | Manual MTTR (status quo)            | Automated (Datadog + Bits AI SRE)  |
              |------------------------------------|--------------------------------------|------------------------------------|
              | Time to detect                     | 8–20 min (provider calls aggregate) | < 60 sec (queue-depth monitor)     |
              | Time to root-cause                 | 25–60 min (cross-team triage)       | < 90 sec (Bits AI SRE walks queue → config_version) |
              | Time to remediate                  | 15–30 min (manual config rollback)  | < 3 min (workflow rollback API)    |
              | **Total MTTR**                     | **45–90 min**                        | **< 5 min**                        |
              | STAT TAT breaches per incident     | 60–150 STAT orders past contracted window | < 10 STAT orders affected     |
              | Routine TAT breaches per incident  | 400–1,200 routine orders past contract | < 100 routine orders affected   |
              | Specimens at re-collection risk    | 10–40 specimens past stability      | 0 specimens                        |

              ## Direct contractual exposure (per incident)

              Most large-IDN and reference-lab contracts include
              **TAT-percentile credits** (Quest owes a per-order credit
              when STAT TAT misses the contracted window). Typical
              schedule: **$3–$8 per STAT breach, $1–$3 per routine
              breach.**

              - Manual incident: ~120 STAT × $5 + ~800 routine × $2 ≈
                **$2,200 in direct credits per incident**
              - Automated incident: ~8 STAT × $5 + ~80 routine × $2 ≈
                **$200 in credits per incident**
              - **Per-incident savings: ~$2,000 in direct contractual
                credits**, before considering renewal-cycle pricing
                impact.

              ## Annualized at Quest scale

              Conservative assumption: **6 HL7-engine-class incidents
              per year** at one of Quest's ~40 regional reference
              labs. Most labs run >1 incident class of this severity
              per year across HL7 engine, LIMS pool exhaustion, db
              failover, courier-API outages, etc.

              | Scope                                   | Annual MTTR hrs saved | TAT-credit dollars avoided | Specimens re-collection avoided |
              |-----------------------------------------|-----------------------|----------------------------|--------------------------------- |
              | One regional reference lab              | 6 × 1.25 = **7.5 hrs** | ~$12,000                   | ~50                             |
              | Quest national footprint (40+ labs)     | 300+ hrs              | ~$480,000                  | ~2,000                          |

              ## What's not on the spreadsheet (the bigger numbers)

              **Contract renewal risk.** When an IDN customer pulls
              their TAT-performance report at renewal and sees
              repeated SLA misses, the next conversation is about
              re-pricing or vendor change. Datadog gives Quest a
              defensible "we caught and remediated it in under 5 min"
              story per incident, with the time-series evidence to
              prove it.

              **Specimen re-collection.** Patient-side cost of one
              re-collected specimen averages **$120–$400** (patient
              recall, re-draw, re-courier, re-analyze) — plus
              reputational damage with the ordering provider. Avoiding
              50 re-collections per lab × 40 labs = **2,000 specimens
              per year**, at >$240K in direct re-collection cost alone,
              before counting the harder-to-quantify trust impact.

              **Regulatory recordkeeping.** Every cold-chain breach is
              a CAP recordkeeping event; every CLIA QC failure window
              has to be reconciled in the logbook. Real-time
              `hospital.specimen.refrigerator_temp_celsius` and
              `hospital.analyzer.qc_fail_total` surveillance + auto-cases
              = catching events the day they happen rather than at
              end-of-month audit prep, which protects Quest's CAP and
              CLIA certifications.

              **Vendor leverage on the integration engine itself.**
              When the integration team has time-series evidence of a
              vendor-pushed config regression on the Rhapsody engine,
              the next support call is *evidence-driven* rather than
              he-said-she-said. That is faster fixes and credible SLA
              enforcement on the integration vendor.

              **Provider-experience NPS.** The provider-results-portal
              is the customer-facing surface; outages there translate
              directly into call-center volume, which translates into
              provider NPS. Each NPS point loss on a top-20
              ordering-provider customer is worth low-seven-figure
              annual revenue if it costs Quest the renewal.

              ## Bottom line

              The Datadog + Bits AI SRE stack pays for itself on the
              first prevented TAT-credit incident, the first prevented
              re-collection event, or the first 60-minute MTTR avoided
              at a single reference lab. Across Quest's national
              footprint, **the math compounds linearly** — and every
              additional incident pattern automated after that is
              pure margin against the same observability spend.

              ---
              ## Follow-ups

              1. Re-deploy the fixed HL7 routing rule under a **canary
                 cluster** that handles ≤5% of outbound volume for 24h
                 before promotion.
              2. Add a **pre-deploy synthetic** that ships one canary
                 ORU^R01 through every outbound route and asserts an
                 ACK before allowing the deploy to promote.
              3. Make `hospital.hl7.config_version` change a **release
                 gate signal** in Datadog Change Tracking — every
                 increment auto-correlates against routing-error and
                 NACK counters for 15 minutes post-deploy.
              4. Walk this notebook with the next integration vendor
                 QBR — turn "your engine occasionally breaks" into a
                 quantified product-reliability conversation.
        type: "notebook_cells"

  - id: "quest-tat-slo-burn-runbook"
    name: "📉 Quest TAT SLO Burn Runbook"
    type: runbook
    description: "Operational runbook for responding to STAT or routine TAT SLO burn-rate alerts. Walks through the standard diagnostic ladder (delivery layer → LIMS → analyzers → specimen logistics) so on-call can localize the bottleneck in under 3 minutes. Cross-references the HL7 cascade RCA notebook when delivery is the cause."
    time_range: "1h"
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:lab-informatics"
      - "incident_domain:diagnostic-laboratory"
    cells:

      - attributes:
          definition:
            type: "markdown"
            text: |
              # TAT SLO Burn Runbook

              Use this runbook when a STAT or routine TAT SLO is
              burning faster than budget. Goal: localize the
              bottleneck to one of three layers — **delivery**,
              **LIMS**, or **lab production** — in under 3 minutes,
              then jump to the right deeper runbook.

              ## Decision ladder

              1. **Delivery layer healthy?** Check HL7 outbound queue
                 and LIMS results-pending-delivery. If both are
                 climbing, jump to the HL7 Engine Config Cascade RCA
                 notebook.
              2. **LIMS healthy?** Check DB pool active and order
                 receipt rate. If LIMS is the bottleneck but HL7
                 looks fine, check db backups, recent schema migration,
                 or external EHR feeds.
              3. **Lab production healthy?** Check analyzer test
                 completion rate and pre-analytic queue depth. If the
                 lab is slow, walk reagent QC, calibration age, and
                 module status.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "queue"
                    query: "max:hospital.hl7.outbound_queue_depth{device_type:hl7_integration_engine}"
                  - data_source: "metrics"
                    name: "pending"
                    query: "max:hospital.lims.results_pending_delivery{device_type:lims_app_server}"
                  - data_source: "metrics"
                    name: "preq"
                    query: "max:hospital.specimen.queue_depth_pre_analytic{device_type:centrifuge}"
                formulas:
                  - formula: "queue"
                    alias: "HL7 outbound queue"
                  - formula: "pending"
                    alias: "LIMS results pending"
                  - formula: "preq"
                    alias: "Pre-analytic queue"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Pattern recognition:**

              | What you see                                  | Likely layer            | Next step                                  |
              |-----------------------------------------------|-------------------------|---------------------------------------------|
              | HL7 queue + LIMS pending both climbing        | Delivery (HL7 engine)   | HL7 Engine Config Cascade RCA notebook      |
              | LIMS pending climbing, HL7 queue flat         | LIMS-internal           | LIMS db / external EHR feed check           |
              | Pre-analytic queue + analyzer slowdown        | Lab production          | Reagent QC + analyzer module status check   |
              | All three flat, but TAT still burning         | Burn from earlier window | Look back 1–2 hours; backlog working through |

              Action: route the SLO burn-rate alert into the appropriate
              deeper runbook based on the table above.
        type: "notebook_cells"
