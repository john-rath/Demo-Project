# AdventHealth sub-vertical monitors — Sensing-Hospital care-experience cascade.
#
# Tag scheme mirrors the healthcare vertical's existing standards:
#   - vertical:healthcare / dd-demo-toolkit:true  auto-injected
#   - team:<role>                 existing role (digital-health)
#   - incident_domain:<value>     existing key, value `care-experience`
#   - signal_chain:<position>     same scheme as base
#   - safety / audience           existing keys, existing values
#
# Query language: gauges use avg:/max: only — NO percentile aggregators
# (Style Guide §1.1; they need histogram metrics + per-metric config and
# silently return "No data" otherwise). Ratios use sum/sum*100. Range checks
# are split into two monitors (§1.3 — no ||/&&).

monitors:

  # ----- Signal chain for the care-experience cascade -------------------
  # 1-root-cause: on-prem RTLS location-event sync lag
  - name: "[Healthcare/AdventHealth] RTLS Location Sync Lag Elevated"
    type: "query alert"
    query: "avg(last_5m):avg:hospital.sensing.rtls_sync_lag_ms{device_type:room_sensing_gateway,department:MedSurg} by {device_id} > 3000"
    message: "📡 SenseHub RTLS sync lag >3s in MedSurg (normal ~150ms). Likely on-prem rtls-location-service config drift. Trace upstream before the cloud routing engine starves on stale location data."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:1-root-cause"
    priority: 2

  # 1b-root-cause: staff-badge location staleness
  - name: "[Healthcare/AdventHealth] Staff Location Data Stale"
    type: "query alert"
    query: "avg(last_5m):avg:hospital.sensing.location_staleness_sec{device_type:room_sensing_gateway,department:MedSurg} by {device_id} > 120"
    message: "⏱ Staff-badge location data >2min stale in MedSurg. Care-team routing cannot resolve the nearest caregiver. Check rtls-location-service sync."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:1-root-cause"
    priority: 2

  # 2-leading-indicator: care-team routing latency
  - name: "[Healthcare/AdventHealth] Care-Team Routing Latency High"
    type: "query alert"
    query: "avg(last_5m):avg:hospital.cxp.care_team_routing_latency_ms{department:MedSurg} by {device_id} > 4000"
    message: "🐢 Care-team routing latency >4s in MedSurg. Leading indicator for patient-responsiveness impact. Stale RTLS location data is starving care-experience-platform."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:2-leading-indicator"
    priority: 2

  # 2b-leading-indicator: routing failures
  - name: "[Healthcare/AdventHealth] Care-Team Routing Failures Spike"
    type: "query alert"
    query: "sum(last_5m):sum:hospital.cxp.routing_failures_total{department:MedSurg} > 8"
    message: "🔁 More than 8 care-team routing failures in 5 min in MedSurg. Requests are not reaching the nearest caregiver. Check care-experience-platform and upstream location sync."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:2-leading-indicator"
    priority: 2

  # 3-symptom: nurse-call acknowledgement latency (patient-visible)
  - name: "[Healthcare/AdventHealth] Patient Call Acknowledgement Slow"
    type: "query alert"
    query: "avg(last_5m):avg:hospital.cxp.call_ack_latency_sec{department:MedSurg} by {device_id} > 60"
    message: "🚨 Patient call-button acknowledgement >60s in MedSurg. Patients are waiting at the bedside. Driven upstream by care-team routing latency and stale RTLS location data."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:3-symptom"
      - "safety:patient-safety"
    priority: 1

  # 3b-symptom: perceived responsiveness score drop
  - name: "[Healthcare/AdventHealth] Patient Responsiveness Score Low"
    type: "query alert"
    query: "avg(last_10m):avg:hospital.cxp.responsiveness_score{department:MedSurg} < 70"
    message: "📉 Perceived patient-responsiveness score below 70 in MedSurg. HCAHPS responsiveness domain at risk. Correlate with care-team routing latency."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:3-symptom"
      - "audience:nursing"
    priority: 2

  # 3c-symptom: bedside engagement tablet (EuD) latency
  - name: "[Healthcare/AdventHealth] Bedside Tablet App Latency High"
    type: "query alert"
    query: "avg(last_5m):max:hospital.cxp.bedside_app_latency_ms{device_type:bedside_engagement_tablet,department:MedSurg} by {device_id} > 2500"
    message: "📱 Bedside engagement tablet round-trip >2.5s in MedSurg. The patient-facing end-user device is degraded. Check care-experience-platform session API."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:3-symptom"
    priority: 2

  # 4-cascade: cloud routing service error rate (the smoking gun)
  - name: "[Healthcare/AdventHealth] Care Experience Platform Error-Rate Spike"
    type: "query alert"
    query: "avg(last_5m):sum:hospital.app.errors_total{service_name:care-experience-platform} / sum:hospital.app.requests_total{service_name:care-experience-platform} * 100 > 5"
    message: "🔥 care-experience-platform error rate >5%. Routing engine choking on stale location data. Trace dependency upstream to rtls-location-service."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:4-cascade"
    priority: 1

  # 4b-cascade: on-prem location service latency
  - name: "[Healthcare/AdventHealth] RTLS Location Service Latency Anomaly"
    type: "query alert"
    query: "avg(last_5m):avg:hospital.app.latency_ms{service_name:rtls-location-service} > 1500"
    message: "🔗 rtls-location-service avg latency >1.5s. On-prem location resolution degraded — the root of the care-experience cascade. Validate config and sync workers."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
      - "incident_domain:care-experience"
      - "signal_chain:4-cascade"
    priority: 2

  # ----- Standalone sensing-fleet health monitors (not in cascade) ------

  - name: "[Healthcare/AdventHealth] Room Sensing Gateway Offline"
    type: "query alert"
    query: "sum(last_5m):sum:hospital.device.online{device_type:room_sensing_gateway} by {device_id,floor,wing,department} < 1"
    message: "🛰️ SenseHub room sensing gateway offline on Floor {{floor.name}} {{wing.name}} {{department.name}}. Room loses RTLS, call routing, and comfort sensing."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:biomed"
      - "incident_domain:care-experience"
      - "safety:patient-safety"
    priority: 1

  - name: "[Healthcare/AdventHealth] Bedside Tablet Battery Low"
    type: "query alert"
    query: "avg(last_10m):avg:hospital.device.battery_pct{device_type:bedside_engagement_tablet} by {device_id} < 20"
    message: "🔋 Bedside engagement tablet battery below 20%. Patient loses access to meals, messaging, and education until swapped."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:biomed"
      - "incident_domain:care-experience"
    priority: 3

  - name: "[Healthcare/AdventHealth] Patient Room Too Warm"
    type: "query alert"
    query: "avg(last_10m):avg:hospital.cxp.room_temp_celsius{device_type:ambient_comfort_sensor} by {device_id} > 25"
    message: "🌡️ Patient room above 25°C in MedSurg. Comfort impact — dispatch facilities to check HVAC."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:facilities"
      - "incident_domain:care-experience"
    priority: 3

  - name: "[Healthcare/AdventHealth] Patient Room Too Cold"
    type: "query alert"
    query: "avg(last_10m):avg:hospital.cxp.room_temp_celsius{device_type:ambient_comfort_sensor} by {device_id} < 20"
    message: "🌡️ Patient room below 20°C in MedSurg. Comfort impact — dispatch facilities to check HVAC."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:facilities"
      - "incident_domain:care-experience"
    priority: 3
