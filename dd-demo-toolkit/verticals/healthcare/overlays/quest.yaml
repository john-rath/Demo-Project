# Quest Diagnostics sub-vertical overlay for the healthcare vertical.
#
# Quest is a clinical diagnostics lab, not a hospital. The observability
# story therefore lives at the SOFTWARE layer Quest owns and operates,
# NOT at the lab-instrument layer. Roche cobas, Abbott Architect, Sysmex,
# and PCR instruments are vendor-locked appliances that do not emit
# Prom/OTel metrics directly; their telemetry reaches Datadog through
# instrument middleware (Data Innovations IM, Roche cobas IT, Abbott
# AlinIQ), the LIMS (Beaker / Sunquest / SoftLab), and the HL7
# integration engine (Rhapsody / Mirth / Cloverleaf) -- all software
# Quest owns and can instrument with APM + custom metrics.
#
# Mapping of "device" entries below to the real-world data source the
# Quest SRE team would actually scrape:
#
#   chemistry/hematology/molecular/immunoassay_analyzer
#     -> Vendor middleware (Data Innovations IM, Roche cobas IT) running
#        on a Quest-managed server. Middleware exposes per-instrument
#        runtime state (online, current run, QC results, calibration
#        age, reagent inventory) via SNMP/REST/DB. The simulator models
#        the analyzer as a "device" because that is how the metric
#        ultimately tags out, but the EMIT POINT is middleware.
#
#   centrifuge / specimen_sorter
#     -> Pre-analytic automation lines (Inpeco, Roche CCM, Beckman
#        Power Express) expose queue depth + cycle metrics via vendor
#        API or industrial PLC scrape. Modern lines support this; older
#        standalone centrifuges do not -- treat the device count as the
#        "automated portion of the line".
#
#   refrigerated_storage
#     -> Real IoT. Cold-chain monitoring (Sensitech, Berlinger,
#        Cooper-Atkins) is mandated by CAP/CDC and ships native
#        telemetry today. This is the one device entry that is a
#        literal Datadog Agent / OTel target.
#
#   lims_app_server
#     -> Quest-managed Beaker / Sunquest / SoftLab cluster nodes. APM
#        + JVM/.NET runtime metrics + custom business metrics (orders
#        received, results pending, TAT counters). Fully instrumentable.
#
#   hl7_integration_engine
#     -> Rhapsody / Mirth / Cloverleaf nodes. APM + queue/route/ACK
#        custom metrics. The CHOKE POINT in the Quest cascade demo --
#        a bad config push here is the root cause.
#
#   courier_terminal
#     -> Driver handhelds / vehicle tablets running Quest's logistics
#        app. Real metrics: app health, GPS sync, route progress.
#
# The notebook `quest-lab-integration-cascade-rca` walks through this
# data-sourcing map in detail so customer stakeholders can answer
# "how would you actually get this into Datadog?" before they leave
# the room.
#
# Tagging -- strictly the existing healthcare standards, no new keys:
#   - `device_type:<value>` for new device-type values (lims_app_server, etc.)
#   - `device_manufacturer:Quest` (Quest-owned software) or vendor name
#     (e.g. `Sysmex`, `Roche`, `Abbott`) for analyzers seen via middleware
#   - `device_category:clinical_lab_automation` / `lab_software_infrastructure`
#     / `specimen_logistics` (new VALUES under the existing category key)
#   - department `Lab` (already in healthcare's department dimension)
#
# This file is loaded by ConfigLoader.load_vertical(..., sub_vertical="quest")
# and merged into the base healthcare config: device lists are concatenated,
# services are appended. Resource files (monitors, dashboards, etc.) live
# next to this file under overlays/quest/.

device_categories:

  # ----- New category: instruments-as-seen-via-middleware -----
  # IP base 10.120 (avoids collision with base healthcare 10.100/.150/.180/
  # .190/.200/.210 and BD overlay 10.110).
  clinical_lab_automation:
    ip_base: '10.120'
    department_pool:
    - Lab
    devices:

    # ----- Roche cobas chemistry analyzers (the volume workhorse) -----
    # 6 modules. Metrics emit via Roche cobas IT middleware running on
    # a Quest-managed server -- the simulator tags them as device_type
    # `chemistry_analyzer` so dashboards/monitors filter cleanly.
    - type: chemistry_analyzer
      manufacturer: Roche
      model: cobas 8000
      firmware: '06-07'
      count: 6
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [2, 70]
        drift: 0.8
      - name: hospital.analyzer.tests_completed_total
        type: counter
        unit: '1'
        range: [0, 80]
        drift: 1.5
      - name: hospital.analyzer.test_requeue_rate_pct
        type: gauge
        unit: '%'
        range: [0, 25]
        drift: 0.3
      - name: hospital.analyzer.qc_pass_total
        type: counter
        unit: '1'
        range: [0, 12]
        drift: 0.3
      - name: hospital.analyzer.qc_fail_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.analyzer.calibration_age_hr
        type: gauge
        unit: h
        range: [0, 168]
        drift: 0.5
      - name: hospital.analyzer.reagent_inventory_pct
        type: gauge
        unit: '%'
        range: [20, 100]
        drift: 0.5
      - name: hospital.analyzer.reagent_lot_age_days
        type: gauge
        unit: '1'
        range: [0, 60]
        drift: 0.2
      - name: hospital.analyzer.module_status_ok
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005

    # ----- Sysmex hematology analyzers -----
    - type: hematology_analyzer
      manufacturer: Sysmex
      model: XN-9100
      firmware: '00-19'
      count: 4
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [2, 70]
        drift: 0.8
      - name: hospital.analyzer.tests_completed_total
        type: counter
        unit: '1'
        range: [0, 60]
        drift: 1.2
      - name: hospital.analyzer.test_requeue_rate_pct
        type: gauge
        unit: '%'
        range: [0, 25]
        drift: 0.3
      - name: hospital.analyzer.qc_pass_total
        type: counter
        unit: '1'
        range: [0, 10]
        drift: 0.3
      - name: hospital.analyzer.qc_fail_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.analyzer.calibration_age_hr
        type: gauge
        unit: h
        range: [0, 168]
        drift: 0.5
      - name: hospital.analyzer.reagent_inventory_pct
        type: gauge
        unit: '%'
        range: [20, 100]
        drift: 0.5
      - name: hospital.analyzer.module_status_ok
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005

    # ----- Roche/Cepheid molecular (PCR) analyzers -----
    - type: molecular_analyzer
      manufacturer: Roche
      model: cobas 6800
      firmware: '02-04'
      count: 4
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [2, 70]
        drift: 0.8
      - name: hospital.analyzer.tests_completed_total
        type: counter
        unit: '1'
        range: [0, 12]
        drift: 0.3
      - name: hospital.analyzer.qc_pass_total
        type: counter
        unit: '1'
        range: [0, 4]
        drift: 0.1
      - name: hospital.analyzer.qc_fail_total
        type: counter
        unit: '1'
        range: [0, 1]
        drift: 0.02
      - name: hospital.analyzer.calibration_age_hr
        type: gauge
        unit: h
        range: [0, 168]
        drift: 0.5
      - name: hospital.analyzer.reagent_inventory_pct
        type: gauge
        unit: '%'
        range: [20, 100]
        drift: 0.5
      - name: hospital.analyzer.module_status_ok
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005

    # ----- Abbott Architect immunoassay analyzers -----
    - type: immunoassay_analyzer
      manufacturer: Abbott
      model: Architect i2000SR
      firmware: '8.50'
      count: 4
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [2, 70]
        drift: 0.8
      - name: hospital.analyzer.tests_completed_total
        type: counter
        unit: '1'
        range: [0, 40]
        drift: 0.8
      - name: hospital.analyzer.test_requeue_rate_pct
        type: gauge
        unit: '%'
        range: [0, 25]
        drift: 0.3
      - name: hospital.analyzer.qc_pass_total
        type: counter
        unit: '1'
        range: [0, 8]
        drift: 0.2
      - name: hospital.analyzer.qc_fail_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.analyzer.calibration_age_hr
        type: gauge
        unit: h
        range: [0, 168]
        drift: 0.5
      - name: hospital.analyzer.reagent_inventory_pct
        type: gauge
        unit: '%'
        range: [20, 100]
        drift: 0.5
      - name: hospital.analyzer.module_status_ok
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005

    # ----- Pre-analytic centrifuges (part of automation line) -----
    - type: centrifuge
      manufacturer: Inpeco
      model: FlexLab Centrifuge
      firmware: '4.2'
      count: 8
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.specimen.queue_depth_pre_analytic
        type: gauge
        unit: '1'
        range: [0, 250]
        drift: 2.0
      - name: hospital.specimen.centrifuge_cycle_time_sec
        type: gauge
        unit: s
        range: [240, 720]
        drift: 4.0
      - name: hospital.specimen.processed_total
        type: counter
        unit: '1'
        range: [0, 18]
        drift: 0.5

    # ----- Specimen sorter (downstream of centrifuge) -----
    - type: specimen_sorter
      manufacturer: Inpeco
      model: FlexLab Sorter
      firmware: '4.2'
      count: 2
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.specimen.queue_depth_analytic
        type: gauge
        unit: '1'
        range: [0, 500]
        drift: 3.0
      - name: hospital.specimen.sorter_throughput_per_hr
        type: gauge
        unit: '1'
        range: [200, 1400]
        drift: 10.0
      - name: hospital.specimen.sorter_misroutes_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.03

    # ----- Refrigerated specimen storage (REAL IoT - cold chain) -----
    # CAP / CDC mandate cold-chain monitoring on specimen storage; this
    # is the one device class where the literal box runs a Datadog Agent
    # or pushes OTel today.
    - type: refrigerated_storage
      manufacturer: Sensitech
      model: TempTale CXP
      firmware: '3.4'
      count: 6
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.specimen.refrigerator_temp_celsius
        type: gauge
        unit: Cel
        range: [1.5, 8.0]
        drift: 0.05
      - name: hospital.specimen.refrigerated_capacity_pct
        type: gauge
        unit: '%'
        range: [10, 95]
        drift: 0.5
      - name: hospital.specimen.stability_min_remaining
        type: gauge
        unit: min
        range: [30, 480]
        drift: 3.0
      - name: hospital.specimen.stability_breaches_total
        type: counter
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.specimen.door_open_events_total
        type: counter
        unit: '1'
        range: [0, 4]
        drift: 0.1

  # ----- New category: lab software infrastructure -----
  # These "devices" are actually servers running Quest-owned software.
  # Modeling them as devices lets the simulator emit per-node telemetry
  # the same way Datadog Agent + APM would in production. APM service
  # metrics (`hospital.app.*`) come from the services: section below.
  lab_software_infrastructure:
    ip_base: '10.130'
    department_pool:
    - Lab
    devices:

    # ----- LIMS (Beaker / Sunquest / SoftLab) cluster nodes -----
    # System of record for orders, results, QC, and TAT. ALL TAT
    # counters originate here -- LIMS is the only system that knows
    # accession_time and verified_time, so it computes TAT-within-SLA
    # totals and ships them as custom DogStatsD counters.
    - type: lims_app_server
      manufacturer: Quest
      model: LIMS Cluster Node
      firmware: 'beaker-2025.2'
      count: 4
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [5, 90]
        drift: 1.2
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [25, 85]
        drift: 0.8
      - name: hospital.lims.orders_received_total
        type: counter
        unit: '1'
        range: [0, 80]
        drift: 1.5
      - name: hospital.lims.results_pending_delivery
        type: gauge
        unit: '1'
        range: [0, 3000]
        drift: 8.0
      - name: hospital.lims.results_verified_total
        type: counter
        unit: '1'
        range: [0, 75]
        drift: 1.5
      - name: hospital.lims.db_pool_active
        type: gauge
        unit: '1'
        range: [5, 200]
        drift: 3.0
      - name: hospital.lims.db_pool_capacity
        type: gauge
        unit: '1'
        range: [200, 200]
        drift: 0.0
      - name: hospital.lims.hl7_writes_failed_total
        type: counter
        unit: '1'
        range: [0, 3]
        drift: 0.05
      - name: hospital.lims.qc_evaluations_total
        type: counter
        unit: '1'
        range: [0, 30]
        drift: 0.6
      # ---- TAT counters (LIMS-derived) -----------------------------
      # TAT-within-SLA counters are written as DogStatsD increments
      # by LIMS at result-verification time. Numerator/denominator
      # pairs are intentional so SLOs can compute success ratio.
      - name: hospital.tat.routine_orders_completed_total
        type: counter
        unit: '1'
        range: [0, 60]
        drift: 1.2
      - name: hospital.tat.routine_orders_within_target_total
        type: counter
        unit: '1'
        range: [0, 58]
        drift: 1.2
      - name: hospital.tat.routine_breaches_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.tat.stat_orders_completed_total
        type: counter
        unit: '1'
        range: [0, 8]
        drift: 0.2
      - name: hospital.tat.stat_orders_within_target_total
        type: counter
        unit: '1'
        range: [0, 8]
        drift: 0.2
      - name: hospital.tat.stat_breaches_total
        type: counter
        unit: '1'
        range: [0, 1]
        drift: 0.02
      - name: hospital.tat.stat_in_flight_count
        type: gauge
        unit: '1'
        range: [0, 60]
        drift: 0.8
      - name: hospital.tat.routine_in_flight_count
        type: gauge
        unit: '1'
        range: [0, 400]
        drift: 4.0

    # ----- HL7 integration engine (Rhapsody/Mirth/Cloverleaf) -----
    # The CHOKE POINT for the Quest cascade. Outbound HL7 ORU^R01
    # messages (results to ordering providers) flow through this
    # engine. A bad routing-rule config push here is the demo's root
    # cause -- everything below cascades from these signals.
    - type: hl7_integration_engine
      manufacturer: Quest
      model: HL7 Engine Cluster
      firmware: 'rhapsody-7.3'
      count: 3
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [5, 90]
        drift: 1.2
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [25, 80]
        drift: 0.8
      - name: hospital.hl7.outbound_queue_depth
        type: gauge
        unit: '1'
        range: [0, 12000]
        drift: 30.0
      - name: hospital.hl7.worker_thread_utilization_pct
        type: gauge
        unit: '%'
        range: [5, 95]
        drift: 1.5
      - name: hospital.hl7.messages_sent_total
        type: counter
        unit: '1'
        range: [0, 100]
        drift: 2.0
      - name: hospital.hl7.messages_delivered_total
        type: counter
        unit: '1'
        range: [0, 99]
        drift: 2.0
      - name: hospital.hl7.ack_received_total
        type: counter
        unit: '1'
        range: [0, 98]
        drift: 2.0
      - name: hospital.hl7.nack_received_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.hl7.routing_errors_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.05
      - name: hospital.hl7.worker_thread_retries_total
        type: counter
        unit: '1'
        range: [0, 4]
        drift: 0.1
      - name: hospital.hl7.config_version
        type: gauge
        unit: '1'
        range: [1, 100]
        drift: 0.0

  # ----- New category: specimen logistics -----
  specimen_logistics:
    ip_base: '10.140'
    department_pool:
    - Lab
    devices:

    # ----- Courier vehicle terminal (driver handheld / tablet) -----
    - type: courier_terminal
      manufacturer: Zebra
      model: TC58 Vehicle Mount
      firmware: '11.4'
      count: 12
      battery_powered: true
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [10, 100]
        drift: 0.5
      - name: hospital.courier.in_transit_specimens
        type: gauge
        unit: '1'
        range: [0, 80]
        drift: 1.0
      - name: hospital.courier.pickups_completed_total
        type: counter
        unit: '1'
        range: [0, 4]
        drift: 0.1
      - name: hospital.courier.pickup_delays_total
        type: counter
        unit: '1'
        range: [0, 1]
        drift: 0.02
      - name: hospital.courier.route_progress_pct
        type: gauge
        unit: '%'
        range: [0, 100]
        drift: 2.0

# Service catalog additions for the Quest software stack. These services
# anchor the cascade: LIMS -> HL7 integration engine -> provider portals.
# The integration engine is the choke point; lims-core is the upstream
# system that feels back-pressure first; provider-results-portal is the
# customer-visible surface (ordering providers checking on results).
services:

- name: lims-core
  host: lims-app-01
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/orders"
    latency_base_ms: 90
    latency_p99_ms: 450
    error_rate: 0.012
  - name: "POST /api/results/verify"
    latency_base_ms: 120
    latency_p99_ms: 550
    error_rate: 0.018
  - name: "GET /api/results/pending"
    latency_base_ms: 65
    latency_p99_ms: 300
    error_rate: 0.01
  - name: "POST /api/hl7/release"
    latency_base_ms: 80
    latency_p99_ms: 400
    error_rate: 0.015
  dependencies:
  - service: hl7-integration-engine
    operation: "POST /api/route/outbound"
    probability: 0.9
  - service: qc-rules-engine
    operation: "POST /api/qc/evaluate"
    probability: 0.7

- name: hl7-integration-engine
  host: hl7-engine-01
  language: dotnet
  framework: ".NET 8"
  operations:
  - name: "POST /api/route/outbound"
    latency_base_ms: 50
    latency_p99_ms: 250
    error_rate: 0.008
  - name: "POST /api/route/inbound"
    latency_base_ms: 45
    latency_p99_ms: 200
    error_rate: 0.006
  - name: "GET /api/queue/status"
    latency_base_ms: 30
    latency_p99_ms: 120
    error_rate: 0.003
  - name: "POST /api/admin/config/reload"
    latency_base_ms: 120
    latency_p99_ms: 600
    error_rate: 0.02
  dependencies:
  - service: provider-results-portal
    operation: "POST /api/results/ingest"
    probability: 0.6

- name: qc-rules-engine
  host: qc-rules-01
  language: python
  framework: FastAPI
  operations:
  - name: "POST /api/qc/evaluate"
    latency_base_ms: 35
    latency_p99_ms: 180
    error_rate: 0.006
  - name: "GET /api/qc/rules"
    latency_base_ms: 20
    latency_p99_ms: 90
    error_rate: 0.003

- name: provider-results-portal
  host: portal-results-01
  language: java
  framework: Spring Boot
  operations:
  - name: "GET /api/results/lookup"
    latency_base_ms: 75
    latency_p99_ms: 380
    error_rate: 0.015
  - name: "POST /api/results/ingest"
    latency_base_ms: 60
    latency_p99_ms: 300
    error_rate: 0.012
  - name: "GET /api/orders/status"
    latency_base_ms: 55
    latency_p99_ms: 280
    error_rate: 0.01
  dependencies:
  - service: lims-core
    operation: "GET /api/results/pending"
    probability: 0.5

- name: specimen-tracking-api
  host: specimen-track-01
  language: go
  framework: stdlib
  operations:
  - name: "POST /api/specimens/accession"
    latency_base_ms: 35
    latency_p99_ms: 160
    error_rate: 0.008
  - name: "POST /api/specimens/chain-of-custody"
    latency_base_ms: 40
    latency_p99_ms: 180
    error_rate: 0.01
  - name: "GET /api/specimens/locate"
    latency_base_ms: 25
    latency_p99_ms: 100
    error_rate: 0.005

- name: courier-dispatch-service
  host: courier-dispatch-01
  language: python
  framework: Django
  operations:
  - name: "POST /api/routes/assign"
    latency_base_ms: 70
    latency_p99_ms: 320
    error_rate: 0.012
  - name: "GET /api/routes/active"
    latency_base_ms: 40
    latency_p99_ms: 200
    error_rate: 0.008
  - name: "POST /api/routes/reroute"
    latency_base_ms: 110
    latency_p99_ms: 500
    error_rate: 0.018

- name: reagent-inventory-api
  host: reagent-inv-01
  language: java
  framework: Spring Boot
  operations:
  - name: "GET /api/reagents/lots"
    latency_base_ms: 50
    latency_p99_ms: 220
    error_rate: 0.008
  - name: "POST /api/reagents/qc-flag"
    latency_base_ms: 90
    latency_p99_ms: 400
    error_rate: 0.015
