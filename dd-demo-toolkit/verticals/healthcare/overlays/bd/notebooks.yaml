notebooks:

  - id: "bd-pyxis-cascade-rca"
    name: "💊 BD Pyxis Inventory-Sync Cascade — Bits AI SRE Walkthrough"
    type: investigation
    description: "Symptom: nurses report Pyxis dispensing delays in Pharmacy on Floor 1 South. Root cause: vendor-pushed firmware bumped Pyxis inventory polling rate, saturating pyxis-inventory-api → pharmacy-ehr-bridge thread pool → upstream of nurse-visible dispense latency. This notebook walks through the four phases the way Bits AI SRE narrows it down, and closes with a quantified ROI view."
    time_range: "1h"
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:pharmacy-systems"
      - "incident_domain:pharmacy-automation"
      - "signal_chain_root:pyxis-poll-storm"
    cells:

      - attributes:
          definition:
            type: "markdown"
            text: |
              # BD Pyxis MedStation — Inventory-Sync Cascade RCA

              **Symptom report:** Pharmacy ops desk pages: *"Nurses on 1S
              are seeing 3-second waits at the Pyxis cabinet. Some dispenses
              are timing out outright."*

              **Where to look first?** The intuitive answer is the cabinet.
              The cabinet looks fine. CPU normal, drawers cycling, network
              signal healthy. This is the diagnostic gap that Bits AI SRE
              closes by walking *upstream* of the dispense workflow.

              ---
              ## Step 1 — Confirm the symptom
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "avg"
                    query: "avg:hospital.pyxis.dispense_latency_ms{device_type:pyxis_medstation,department:Pharmacy} by {floor,wing}"
                  - data_source: "metrics"
                    name: "max"
                    query: "max:hospital.pyxis.dispense_latency_ms{device_type:pyxis_medstation,department:Pharmacy} by {floor,wing}"
                formulas:
                  - formula: "avg"
                    alias: "Dispense avg by floor/wing"
                  - formula: "max"
                    alias: "Dispense max by floor/wing"
                display_type: "line"
            yaxis:
              scale: "linear"
            markers:
              - value: "y = 2500"
                display_type: "error dashed"
                label: "Critical SLA"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Symptom is real and localized to **Pharmacy / Floor 1 South**.
              The other Pyxis-bearing departments (ICU, ED, MedSurg, Radiology)
              are fine, ruling out a global EHR or HL7 broker problem.

              ---
              ## Step 2 — Cabinet-level health (the obvious-but-wrong lane)

              On-cabinet health is normal. CPU, memory, signal strength,
              drawer mechanics — none of these explain the latency:
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "cpu"
                    query: "avg:hospital.device.cpu_usage_pct{device_type:pyxis_medstation,department:Pharmacy} by {device_id}"
                formulas:
                  - formula: "cpu"
                    alias: "CPU %"
                display_type: "line"
                style:
                  palette: "cool"
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "rssi"
                    query: "avg:hospital.device.signal_strength_dbm{device_type:pyxis_medstation,department:Pharmacy} by {device_id}"
                formulas:
                  - formula: "rssi"
                    alias: "RSSI dBm"
                display_type: "line"
                style:
                  palette: "warm"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              ✅ Cabinet itself is healthy. **The cabinet is the messenger,
              not the cause.**

              ---
              ## Step 3 — Walk upstream: BD Pharmogistics inventory sync

              Bits AI SRE prompts: *"What changed before the dispense
              latency started rising?"*  The answer is two metrics
              upstream — both **leading indicators** of the cascade.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "poll"
                    query: "avg:hospital.pyxis.inventory_poll_rate_per_min{device_type:pyxis_medstation,department:Pharmacy} by {device_id}"
                formulas:
                  - formula: "poll"
                    alias: "Poll rate /min"
                display_type: "line"
            markers:
              - value: "y = 60"
                display_type: "warning dashed"
                label: "Vendor recommended"
              - value: "y = 150"
                display_type: "error dashed"
                label: "Storm threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "lag"
                    query: "avg:hospital.pyxis.sync_lag_to_inventory_ms{device_type:pyxis_medstation,department:Pharmacy} by {device_id}"
                formulas:
                  - formula: "lag"
                    alias: "Sync lag (ms)"
                display_type: "line"
            markers:
              - value: "y = 4000"
                display_type: "error dashed"
                label: "Cascade threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              **Smoking gun.** Inventory polling rate jumped from a steady
              ~12/min baseline up past 180/min about *two minutes before*
              dispense latency degraded. That two-minute lead is what
              tells Bits AI SRE the polling burst is **causal**, not
              coincidental.

              ---
              ## Step 4 — Confirm the upstream service is choking

              If the polling storm is real, `pyxis-inventory-api` should
              show error/latency spikes, and its downstream
              `pharmacy-ehr-bridge` should follow.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "errs"
                    query: "sum:hospital.app.errors_total{service_name:pyxis-inventory-api}.as_count()"
                  - data_source: "metrics"
                    name: "reqs"
                    query: "sum:hospital.app.requests_total{service_name:pyxis-inventory-api}.as_count()"
                formulas:
                  - formula: "errs / reqs * 100"
                    alias: "error %"
                display_type: "line"
            markers:
              - value: "y = 5"
                display_type: "error dashed"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "avg"
                    query: "avg:hospital.app.latency_ms{service_name:pharmacy-ehr-bridge}"
                  - data_source: "metrics"
                    name: "max"
                    query: "max:hospital.app.latency_ms{service_name:pharmacy-ehr-bridge}"
                formulas:
                  - formula: "avg"
                    alias: "avg latency (ms)"
                  - formula: "max"
                    alias: "max latency (ms)"
                display_type: "line"
            markers:
              - value: "y = 1500"
                display_type: "error dashed"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Both confirmed.  Service-map view shows:
              **Pyxis cabinet → pyxis-inventory-api → pharmacy-ehr-bridge → hl7-fhir-broker**
              with errors compounding at the second hop.

              ---
              ## Step 5 — Why it's NOT the WiFi cascade

              The Floor 3 East WiFi/pump cascade (`incident_domain:network-to-device`)
              is a different story.  Quick disambiguation:

              | Signal                                           | WiFi cascade        | Pyxis cascade       |
              |--------------------------------------------------|---------------------|---------------------|
              | `device_type` filter                             | infusion_pump, wireless_ap | pyxis_medstation |
              | Department                                       | ED / ICU            | Pharmacy            |
              | Floor / Wing                                     | 3 / East            | 1 / South           |
              | Signal strength dBm                              | Degrades            | **Unchanged**       |
              | Channel utilization %                            | Saturates           | **Unchanged**       |
              | `incident_domain` tag                            | network-to-device   | pharmacy-automation |
              | Root-cause metric                                | `hospital.network.channel_utilization_pct` | `hospital.pyxis.inventory_poll_rate_per_min` |

              The two stories are *spatially* (different floor + wing +
              department), *temporally* (offset by ≥50 ticks at startup),
              and *namespace* (zero metric overlap) disjoint.  Bits AI SRE
              filtering by `incident_domain:pharmacy-automation` will not
              pull WiFi-cascade signals into the chain.

              ---
              ## Step 6 — Remediation

              The self-heal workflow `bd-pyxis-rate-limit-recovery`
              throttles the Pyxis polling rate via the pyxis-inventory-api
              admin endpoint.  Watch the recovery:
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "lat"
                    query: "avg:hospital.pyxis.dispense_latency_ms{device_type:pyxis_medstation,department:Pharmacy}"
                  - data_source: "metrics"
                    name: "lag"
                    query: "avg:hospital.pyxis.sync_lag_to_inventory_ms{device_type:pyxis_medstation,department:Pharmacy}"
                  - data_source: "metrics"
                    name: "poll"
                    query: "avg:hospital.pyxis.inventory_poll_rate_per_min{device_type:pyxis_medstation,department:Pharmacy}"
                formulas:
                  - formula: "lat"
                    alias: "Dispense latency (ms)"
                  - formula: "lag"
                    alias: "Sync lag (ms)"
                  - formula: "poll"
                    alias: "Poll rate /min"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Once polling is back at ≤60/min, sync lag drains within 90s
              and dispense latency (avg + max) returns to baseline.

              ---
              # 💰 Business Impact & ROI

              The cascade above looks technical, but every second of
              degradation translates into measurable nurse, patient, and
              compliance costs. This is why automation + observability
              isn't a "nice to have" line item — it pays for itself on
              the first preventable incident.

              ## What just happened, in operations terms

              - **Affected fleet:** 18 Pyxis MedStation cabinets across
                Pharmacy and satellite locations
              - **Cascade duration if undetected:** typically 60–90 minutes
                of MTTR through manual triage (vendor finger-pointing
                between BD, pharmacy software, and network teams)
              - **Cascade duration with Datadog auto-remediation workflow:**
                **<5 minutes** end-to-end (detect → root-cause → throttle →
                verify recovery → notify)

              ## ROI math — single incident

              | Lever                              | Manual MTTR (status quo)            | Automated (Datadog + Bits AI SRE) |
              |-----------------------------------|--------------------------------------|------------------------------------|
              | Time to detect                     | 8–15 min (nurse complaint → ops)    | < 60 sec (poll-rate monitor)       |
              | Time to root-cause                 | 30–60 min (cross-team triage)       | < 90 sec (Bits AI SRE causal walk) |
              | Time to remediate                  | 30+ min (vendor call, manual change)| < 2 min (workflow rate-limit API)  |
              | **Total MTTR**                     | **60–90 min**                        | **< 5 min**                        |
              | Dispense workflow delays           | ~540 dispenses/hr × 1.5h × 2.5s ≈ **34 nurse-minutes** | ~540 dispenses/hr × 0.08h × 2.5s ≈ **2 nurse-minutes** |
              | Med-administration delays         | 80–120 doses delayed 2–5 min        | < 10 doses delayed                 |
              | Compliance audit exposure          | Full incident logged; manual RCA needed | Auto-RCA notebook + workflow log captured |

              **Direct labor savings per incident** (loaded nurse cost
              ~$70/hr, loaded biomed/IT cost ~$110/hr):
              - Nurse time: 32 min × $70/hr ≈ **$37**
              - Biomed/IT triage: 90 min × $110/hr ≈ **$165**
              - **Per-incident savings: ~$200 direct, before downstream
                impact**

              ## Annualized at hospital scale

              Conservative assumption: **12 such polling-storm-class
              incidents per year** (vendor pushes, config drift, capacity
              events). Hospital-system numbers scale linearly:

              | Scope                          | Annual MTTR hours saved | Annual nurse-hours preserved | Direct cost avoided |
              |--------------------------------|-------------------------|-------------------------------|---------------------|
              | Single 500-bed hospital        | 12 × 1.5 = **18 hrs**   | ~10 hrs (workflow drag)       | ~$2,400             |
              | 10-hospital regional system    | 180 hrs                 | 100 hrs                       | $24,000             |
              | 100-hospital national system   | 1,800 hrs               | 1,000 hrs                     | $240,000            |

              **And this is for ONE incident pattern.** A mature program
              automates dozens of patterns (WiFi cascades, FHIR broker
              backpressure, EHR queue saturation, Rowa robot drift,
              BACTEC LIS lag…), and the savings compound.

              ## What's not on the spreadsheet (the bigger numbers)

              **Sentinel-event prevention.** A single missed STAT
              medication for a coding ICU patient can become a
              joint-commission sentinel event. Average sentinel-event cost
              to a U.S. hospital: **$200K–$1M+ per incident** (legal,
              regulatory, reputational, settlement). Avoiding **one** of
              these per year through faster Pyxis recovery covers the
              entire Datadog spend.

              **DEA / DSCSA compliance.** Pyxis controlled-substance
              discrepancies must be reconciled within 72 hours. Real-time
              `hospital.pyxis.controlled_substance_discrepancies_total`
              surveillance + auto-cases = catching discrepancies the day
              they happen rather than at end-of-month, which protects the
              hospital's DEA registration.

              **Nurse retention / HCAHPS.** Nurse turnover costs
              $40K–$80K per RN. Workflow friction (waiting at the
              cabinet, override paperwork, manual recounts) is the
              #2 cited reason for bedside-RN burnout in BD's own
              surveys. Removing 30+ min of daily cabinet friction per
              nurse moves HCAHPS "responsiveness of staff" scores —
              which feed Medicare reimbursement.

              **Vendor leverage.** When the BD account team has
              `hospital.pyxis.inventory_poll_rate_per_min` time-series
              evidence of a vendor-pushed firmware regression, the next
              support conversation is *evidence-driven* rather than
              he-said-she-said. That's faster fixes and more credible
              SLA enforcement.

              ## Bottom line

              The Datadog + Bits AI SRE stack pays for itself on the
              first prevented sentinel event, the first automated
              compliance catch, or the first 90-minute MTTR avoided
              across a regional system. Every additional pattern
              automated after that is pure margin.

              ---
              ## Follow-ups

              1. File a ticket with BD to roll back the firmware config
                 (or pin the polling rate at a saner default).
              2. Add a guardrail monitor for any future polling-rate drift
                 on `hospital.pyxis.inventory_poll_rate_per_min`.
              3. Capacity-plan `pyxis-inventory-api` thread-pool sizing
                 against worst-case poll burst from full Pyxis fleet.
              4. Bring this notebook to the next BD vendor QBR — turn
                 a "Pyxis is unreliable" anecdote into a quantified
                 product-reliability conversation.
        type: "notebook_cells"
