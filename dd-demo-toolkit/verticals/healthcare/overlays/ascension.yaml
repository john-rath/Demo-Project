# Ascension "Sensing Hospital" sub-vertical overlay for healthcare.
#
# Art-of-the-possible overlay built for Ascension Health. It tells the story
# from the END-USER's perspective — the patient in the bed and the care
# provider at the bedside — rather than the traditional infrastructure-
# monitoring lens. The headline is service QUALITY of the patient
# experience, not staffing.
#
# This overlay mirrors the AdventHealth sensing-hospital overlay in nearly
# every way — same metric namespaces, same device types, same cascade story,
# same monitors/dashboards/notebooks/SLOs/workflow — rebranded for Ascension.
# The one structural addition is a `campus` location dimension (below): a
# fleet of Ascension hospitals so the telemetry spans a realistic multi-site
# health system instead of a single building.
#
# The overlay instruments every MedSurg patient room with a care-experience
# sensing fleet:
#
#   - room_sensing_gateway      RTLS + room-sensing hub (the per-room brain)
#   - bedside_engagement_tablet patient-facing end-user device (EuD)
#   - clinician_mobile          care-provider end-user device (EuD)
#   - ambient_comfort_sensor    room temperature / noise / light comfort
#
# Everything emits under the existing `hospital.*` namespace (env_prefix
# `hospital`) so it rides the base healthcare metric namespace, tag
# standards, and teardown. Two NEW metric sub-domains are introduced — both
# still under `hospital.`:
#
#   - hospital.sensing.*  RTLS / location-sensing signals (root-cause lane)
#   - hospital.cxp.*      Care Experience Platform signals (leading + symptom)
#
# Tagging — strictly the existing healthcare standards, no new identity KEYS:
#   - device_type:<value>           same values as the AdventHealth overlay
#   - device_manufacturer:Ascension (engine-emitted; identifies this overlay)
#   - device_category:care_sensing  (existing `category` key, existing value)
#   - department:MedSurg            (existing department dimension value)
#   - incident_domain:care-experience (existing key + value)
#   - campus:<ascension-hospital>   NEW location dimension (see locations
#                                   block) — a query dimension in the same
#                                   class as floor/wing/department, appended
#                                   via the supported overlay locations merge
#                                   (config.py `_merge_overlay`). It is NOT an
#                                   overlay-identity tag key.
#
# Bifurcation: the cascade plugin (plugins/ascension_care_experience.py) is
# disjoint from the base WiFi cascade (Floor 3 East, hospital.network.*,
# network-to-device) along spatial (MedSurg department + care_sensing device
# types), metric-namespace (hospital.sensing.* / hospital.cxp.*),
# incident_domain, and temporal axes — so Bits AI SRE can isolate this story
# cleanly. (Only one sub-vertical deploys at a time, so this overlay is never
# co-resident with the AdventHealth overlay.)
#
# Loaded by ConfigLoader.load_vertical(..., sub_vertical="ascension"):
# device lists are concatenated onto the base config, services appended, and
# the `campus` dimension appended to locations.dimensions.

# Location dimensions — append a `campus` axis so the fleet spans Ascension's
# multi-hospital footprint. config.py `_merge_overlay` appends overlay-only
# dimensions (existing floor/wing/department keep their base values), and the
# engine attaches every location key to each device's metrics as a tag — so
# `campus:<name>` becomes a real, queryable dimension across the whole fleet
# (base healthcare devices included), giving a far more diverse telemetry
# range than a single-building demo. ~15 hospitals here = the "more hospitals"
# diversity axis; floors (1–5) and wings (East/West/North/South) are inherited
# from the base vertical.
locations:
  dimensions:
  - name: campus
    values:
    - ascension-st-vincents
    - ascension-saint-thomas
    - ascension-seton
    - ascension-sacred-heart
    - ascension-st-john
    - ascension-providence
    - ascension-via-christi
    - ascension-columbia-st-marys
    - ascension-st-agnes
    - ascension-st-joseph
    - ascension-genesys
    - ascension-borgess
    - ascension-st-marys
    - ascension-all-saints
    - ascension-emerald-coast

device_categories:

  # The care_sensing category is the Ascension sensing fleet. Queryable as
  # category:care_sensing from monitors and dashboards. All devices live in
  # MedSurg, the inpatient unit where patient-experience / HCAHPS outcomes
  # matter most. Counts are scaled up vs. a single-building demo so every
  # campus carries several of each device — a richer, more diverse range.
  care_sensing:
    ip_base: '10.120'
    department_pool:
    - MedSurg
    devices:

    # ----- Room Sensing Gateway (the "sensing hospital" centerpiece) ----
    # One per patient room. Aggregates RTLS staff-badge location, routes
    # care-team requests to the nearest caregiver, and derives the room's
    # patient-responsiveness signals. This is the device that carries both
    # the ROOT CAUSE (hospital.sensing.rtls_*) and the patient-visible
    # SYMPTOM (hospital.cxp.*) for the cascade.
    - type: room_sensing_gateway
      manufacturer: Ascension
      model: CareSense Gateway RX
      firmware: '3.1.0'
      count: 45
      battery_powered: false
      metrics:
      # --- Common device health (matches base healthcare conventions) ---
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [3, 90]
        drift: 1.2
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [15, 85]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-80, -28]
        drift: 1.2
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [22, 40]
        drift: 0.2

      # --- RTLS / location sensing (ROOT-CAUSE lane) -------------------
      # When the on-prem rtls-location-service config drifts, sync lag
      # climbs and staff-badge locations go stale. This is the upstream
      # signal Bits AI SRE should land on.
      - name: hospital.sensing.rtls_sync_lag_ms
        type: gauge
        unit: ms
        range: [80, 9000]
        drift: 25.0
      - name: hospital.sensing.location_staleness_sec
        type: gauge
        unit: s
        range: [0, 600]
        drift: 4.0
      - name: hospital.sensing.tracked_badges_count
        type: gauge
        unit: '1'
        range: [0, 40]
        drift: 1.0
      - name: hospital.sensing.location_updates_total
        type: counter
        unit: '1'
        range: [0, 60]
        drift: 1.5
      - name: hospital.sensing.sync_failures_total
        type: counter
        unit: '1'
        range: [0, 3]
        drift: 0.05

      # --- Care Experience Platform signals (LEADING + SYMPTOM) --------
      # care_team_routing_latency_ms is the leading indicator: once
      # location data is stale, the routing engine cannot resolve the
      # nearest caregiver quickly. call_ack_latency_sec and
      # responsiveness_score are the patient-visible symptoms.
      - name: hospital.cxp.care_team_routing_latency_ms
        type: gauge
        unit: ms
        range: [120, 9000]
        drift: 30.0
      - name: hospital.cxp.routing_requests_total
        type: counter
        unit: '1'
        range: [0, 40]
        drift: 1.0
      - name: hospital.cxp.routing_failures_total
        type: counter
        unit: '1'
        range: [0, 5]
        drift: 0.1
      - name: hospital.cxp.call_ack_latency_sec
        type: gauge
        unit: s
        range: [8, 240]
        drift: 3.0
      - name: hospital.cxp.responsiveness_score
        type: gauge
        unit: '1'
        range: [40, 100]
        drift: 1.0
      - name: hospital.cxp.comfort_requests_unmet_total
        type: counter
        unit: '1'
        range: [0, 6]
        drift: 0.15

    # ----- Bedside Engagement Tablet (patient-facing EuD) ---------------
    # The end-user device the patient actually touches: meal orders,
    # messaging the care team, entertainment, education. Sets up the EuD
    # capability story. Round-trip latency degrades when the care-
    # experience-platform is choking on stale location data.
    - type: bedside_engagement_tablet
      manufacturer: Ascension
      model: BedsideConnect
      firmware: '2.4.1'
      count: 60
      battery_powered: true
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [20, 100]
        drift: 0.4
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-82, -30]
        drift: 1.5
      - name: hospital.cxp.bedside_app_latency_ms
        type: gauge
        unit: ms
        range: [150, 6000]
        drift: 40.0
      - name: hospital.cxp.bedside_sessions_total
        type: counter
        unit: '1'
        range: [0, 20]
        drift: 1.0
      - name: hospital.cxp.bedside_crash_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.04
      - name: hospital.cxp.patient_messages_total
        type: counter
        unit: '1'
        range: [0, 15]
        drift: 0.8
      # --- End-user-device (EuD) experience signals --------------------
      # Device-fleet experience as the patient sees the tablet itself —
      # app launch, crashes/hangs, session length, on-device network RTT.
      # Distinct from hospital.cxp.bedside_app_latency_ms (the round-trip
      # to the cloud platform); these describe the device experience.
      - name: hospital.eud.app_launch_ms
        type: gauge
        unit: ms
        range: [300, 6000]
        drift: 30.0
      - name: hospital.eud.app_crashes_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.04
      - name: hospital.eud.app_hang_total
        type: counter
        unit: '1'
        range: [0, 3]
        drift: 0.06
      - name: hospital.eud.session_length_min
        type: gauge
        unit: min
        range: [1, 45]
        drift: 1.5
      - name: hospital.eud.network_rtt_ms
        type: gauge
        unit: ms
        range: [20, 4000]
        drift: 20.0
      - name: hospital.eud.sessions_total
        type: counter
        unit: '1'
        range: [0, 20]
        drift: 1.0

    # ----- Clinician Mobile (care-provider EuD) ------------------------
    # The end-user device the care provider carries: secure messaging,
    # results review, care-team coordination. Rounds out the EuD story
    # from the provider side and pairs with the patient-facing tablet.
    - type: clinician_mobile
      manufacturer: Ascension
      model: CareLink Handset
      firmware: '16.2'
      count: 45
      battery_powered: true
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [15, 100]
        drift: 0.5
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-85, -30]
        drift: 1.5
      - name: hospital.eud.app_launch_ms
        type: gauge
        unit: ms
        range: [250, 5000]
        drift: 25.0
      - name: hospital.eud.app_crashes_total
        type: counter
        unit: '1'
        range: [0, 2]
        drift: 0.04
      - name: hospital.eud.app_hang_total
        type: counter
        unit: '1'
        range: [0, 3]
        drift: 0.06
      - name: hospital.eud.session_length_min
        type: gauge
        unit: min
        range: [1, 30]
        drift: 1.2
      - name: hospital.eud.network_rtt_ms
        type: gauge
        unit: ms
        range: [20, 4000]
        drift: 20.0
      - name: hospital.eud.sessions_total
        type: counter
        unit: '1'
        range: [0, 25]
        drift: 1.2
      - name: hospital.eud.secure_msg_latency_ms
        type: gauge
        unit: ms
        range: [120, 6000]
        drift: 35.0

    # ----- Ambient Comfort Sensor --------------------------------------
    # Room environment as experienced by the patient: temperature, noise,
    # light. Part of the "sensing hospital" comfort story; not part of the
    # cascade, but rounds out the end-user-experience picture.
    - type: ambient_comfort_sensor
      manufacturer: Ascension
      model: RoomSense Comfort
      firmware: '1.2.0'
      count: 45
      battery_powered: true
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.005
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [25, 100]
        drift: 0.3
      - name: hospital.cxp.room_temp_celsius
        type: gauge
        unit: Cel
        range: [19, 26]
        drift: 0.15
      - name: hospital.cxp.noise_level_db
        type: gauge
        unit: dB
        range: [30, 75]
        drift: 1.5
      - name: hospital.cxp.light_level_lux
        type: gauge
        unit: lx
        range: [0, 600]
        drift: 8.0

# Service catalog additions. These two services anchor the Ascension cascade
# and set up the on-prem vs. cloud story. On-prem vs. cloud is encoded in the
# host naming + description today — NOT a new tag key.
#
#   rtls-location-service (ON-PREM) — root cause; the sensing gateways
#       feed it staff-badge location events. A config change makes its
#       sync lag climb.
#   care-experience-platform (CLOUD) — the routing/engagement choke point.
#       Consumes location data from rtls-location-service; bedside tablets
#       call it. Saturates when location data goes stale.
services:
- name: rtls-location-service
  host: rtls-loc-onprem-01
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/location/events"
    latency_base_ms: 50
    latency_p99_ms: 300
    error_rate: 0.01
  - name: "GET /api/location/nearest-caregiver"
    latency_base_ms: 70
    latency_p99_ms: 380
    error_rate: 0.015
  dependencies:
  - service: care-experience-platform
    operation: "POST /api/routing/dispatch"
    probability: 0.8

- name: care-experience-platform
  host: cxp-cloud-01
  language: go
  framework: Gin
  operations:
  - name: "POST /api/routing/dispatch"
    latency_base_ms: 90
    latency_p99_ms: 500
    error_rate: 0.02
  - name: "GET /api/bedside/session"
    latency_base_ms: 60
    latency_p99_ms: 320
    error_rate: 0.012
  dependencies:
  - service: clinical-workflow-engine
    operation: "POST /api/tasks"
    probability: 0.6
