# Healthcare vertical monitors - 12 alert rules
# Migrated from sensing-hospital-demo/create-monitors.py
#
# These monitors fire together during the Floor 3 East incident simulation:
#   1. WiFi Channel Utilization Critical (root cause)
#   2. Medical Device Signal Degradation (leading indicator)
#   3. Critical Medical Device Offline (symptom)
#   4. WiFi Retransmission Rate High (correlated)
#   5-8. Application service error rate spikes
#   9-12. Device-specific and environmental monitors

monitors:
  - name: "[Healthcare] WiFi Channel Utilization Critical"
    type: metric_alert
    query: "avg(last_5m):avg:hospital.network.channel_utilization_pct{device_type:wireless_ap} by {device_id,floor,wing} > 75"
    message: "📡 WiFi channel saturation on Floor {{floor}} {{wing}}. High utilization causes low-power device disconnects."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "incident_domain:network-to-device"
      - "signal_chain:1-root-cause"
    priority: 2

  - name: "[Healthcare] Medical Device Signal Degradation"
    type: metric_alert
    query: "avg(last_5m):avg:hospital.device.signal_strength_dbm{device_category:medical_iot} by {device_id,device_type,floor,wing} < -70"
    message: "📶 Device {{device_type}} signal degrading on Floor {{floor}} {{wing}}. Check WiFi AP status."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "incident_domain:network-to-device"
      - "signal_chain:2-leading-indicator"
    priority: 2

  - name: "[Healthcare] Critical Medical Device Offline"
    type: metric_alert
    query: "sum(last_5m):sum:hospital.device.online{device_category:medical_iot} by {device_id,device_type,floor,wing} < 1"
    message: "🚨 Device {{device_type}} offline on Floor {{floor}} {{wing}}. Check network signal and AP channel utilization."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "incident_domain:network-to-device"
      - "signal_chain:3-symptom"
    priority: 1

  - name: "[Healthcare] WiFi Retransmission Rate High"
    type: metric_alert
    query: "avg(last_5m):avg:hospital.network.retransmit_pct{device_type:wireless_ap} by {device_id,floor,wing} > 8"
    message: "🔄 High packet retransmits on Floor {{floor}} {{wing}} AP. Channel congestion likely."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "incident_domain:network-to-device"
    priority: 2

  - name: "[Healthcare] Patient Portal Error Rate Spike"
    type: metric_alert
    query: "avg(last_5m):sum:hospital.app.errors_total{service_name:patient-portal} / sum:hospital.app.requests_total{service_name:patient-portal} * 100 > 5"
    message: "🚨 Patient Portal error rate elevated. Check upstream services (EHR, auth, FHIR broker)."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:digital-health"
    priority: 1

  - name: "[Healthcare] HL7/FHIR Broker Error Rate Anomaly"
    type: metric_alert
    query: "avg(last_5m):sum:hospital.app.errors_total{service_name:hl7-fhir-broker} / sum:hospital.app.requests_total{service_name:hl7-fhir-broker} * 100 > 4"
    message: "🏥 FHIR Broker critical errors. Impacts all downstream systems (portal, pharmacy, gateway)."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:integration"
    priority: 1

  - name: "[Healthcare] Pharmacy Dispensing API Latency Anomaly"
    type: metric_alert
    query: "avg(last_5m):p99:hospital.app.latency_ms{service_name:pharmacy-dispensing-api} > 2000"
    message: "💊 Pharmacy API p99 latency spiking. Check database connection pool and query performance."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:pharmacy-systems"
    priority: 2

  - name: "[Healthcare] Infusion Pump Occlusion Alert Spike"
    type: metric_alert
    query: "sum(last_5m):sum:hospital.pump.occlusion_alerts_total{} > 10"
    message: "⚠️ Pump occlusion alerts spiking. Check network signal strength and tubing."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:biomed"
    priority: 2

  - name: "[Healthcare] OR Temperature Out of Compliance Range"
    type: metric_alert
    query: "avg(last_5m):avg:hospital.env.room_temperature_f{department:OR} < 68 or avg(last_5m):avg:hospital.env.room_temperature_f{department:OR} > 75"
    message: "🌡️ OR temperature out of range (68-75°F required). Check HVAC system."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:facilities"
      - "safety:patient-safety"
    priority: 1

  - name: "[Healthcare] Nurse Call Response Time Exceeding SLA"
    type: metric_alert
    query: "avg(last_5m):avg:hospital.nursecall.response_time_sec{} > 180"
    message: "📞 Nurse call response time exceeding 3-minute SLA. Check staffing levels and system status."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:operations"
    priority: 2

  - name: "[Healthcare] UPS Battery Runtime Critically Low"
    type: metric_alert
    query: "min(last_5m):min:hospital.env.ups_runtime_min{} < 15"
    message: "🔋 UPS battery runtime critically low (<15 min). Check charge level and load. Life-safety risk."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:facilities"
      - "safety:life-safety"
    priority: 1

  - name: "[Healthcare] Medical Device Gateway Error Spike"
    type: metric_alert
    query: "sum(last_5m):sum:hospital.app.errors_total{service_name:medical-device-gateway} / sum:hospital.app.requests_total{service_name:medical-device-gateway} * 100 > 5"
    message: "🏥 Device Gateway error rate spiking. Likely caused by device disconnects. Check device online status."
    tags:
      - "vertical:healthcare"
      - "dd-demo-toolkit:true"
      - "team:biomed"
      - "incident_domain:network-to-device"
      - "signal_chain:4-cascade"
    priority: 1
