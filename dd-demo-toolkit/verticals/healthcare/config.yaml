vertical:
  name: healthcare
  display_name: AdventHealth Smart Hospital
  description: Full hospital IoT fleet with medical devices, network infrastructure,
    environmental sensors, and clinical application services.
  env_prefix: hospital
  emit_interval_sec: 15

locations:
  dimensions:
  - name: floor
    values:
    - '1'
    - '2'
    - '3'
    - '4'
    - '5'
  - name: wing
    values:
    - East
    - West
    - North
    - South
  - name: department
    values:
    - ED
    - ICU
    - OR
    - MedSurg
    - Radiology
    - Pharmacy
    - Lab
    - Admin

device_categories:
  medical_iot:
    ip_base: '10.100'
    department_pool:
    - ED
    - ICU
    - OR
    - MedSurg
    devices:
    - type: patient_monitor
      manufacturer: Philips
      model: IntelliVue MX800
      firmware: '4.3.1'
      count: 24
      battery_powered: true
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [10, 80]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [25, 45]
        drift: 0.3
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
    - type: infusion_pump
      manufacturer: BD
      model: Alaris 8015
      firmware: '12.1.3'
      count: 32
      battery_powered: true
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [10, 80]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [25, 45]
        drift: 0.3
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.pump.flow_rate_ml_hr
        type: gauge
        unit: mL/h
        range: [1, 500]
        drift: 2.0
      - name: hospital.pump.occlusion_alerts_total
        type: counter
        unit: '1'
        range: [0, 5]
        drift: 0.1
      - name: hospital.pump.air_in_line_alerts_total
        type: counter
        unit: '1'
        range: [0, 3]
        drift: 0.05
    - type: ventilator
      manufacturer: Medtronic
      model: PB980
      firmware: '3.2.1'
      count: 8
      battery_powered: false
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [10, 80]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [25, 45]
        drift: 0.3
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
    - type: smart_bed
      manufacturer: Hill-Rom
      model: Centrella
      firmware: '2.5.4'
      count: 30
      battery_powered: false
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [10, 80]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [25, 45]
        drift: 0.3
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.bed.occupied_count
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.05
    - type: medication_dispenser
      manufacturer: Omnicell
      model: XT
      firmware: '5.1.0'
      count: 6
      battery_powered: false
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.device.memory_usage_pct
        type: gauge
        unit: '%'
        range: [10, 80]
        drift: 0.8
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
      - name: hospital.device.temperature_celsius
        type: gauge
        unit: Cel
        range: [25, 45]
        drift: 0.3
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.pharmacy.dispense_events_total
        type: counter
        unit: '1'
        range: [0, 20]
        drift: 0.5
  network_infra:
    ip_base: '10.200'
    department_pool:
    - Network
    devices:
    - type: wireless_ap
      manufacturer: Cisco
      model: Catalyst 9130AX
      firmware: '17.9.4'
      count: 40
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.network.channel_utilization_pct
        type: gauge
        unit: '%'
        range: [5, 95]
        drift: 3.0
      - name: hospital.network.connected_clients
        type: gauge
        unit: '1'
        range: [0, 60]
        drift: 2.0
      - name: hospital.network.retransmit_pct
        type: gauge
        unit: '%'
        range: [0, 15]
        drift: 0.5
      - name: hospital.network.latency_ms
        type: gauge
        unit: ms
        range: [1, 100]
        drift: 2.0
      - name: hospital.device.signal_strength_dbm
        type: gauge
        unit: dBm
        range: [-90, -20]
        drift: 2.0
    - type: network_switch
      manufacturer: Cisco
      model: Catalyst 9300
      firmware: '17.6.1'
      count: 16
      battery_powered: false
      metrics:
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
      - name: hospital.device.cpu_usage_pct
        type: gauge
        unit: '%'
        range: [1, 95]
        drift: 1.0
      - name: hospital.network.throughput_mbps
        type: gauge
        unit: Mbit/s
        range: [10, 1000]
        drift: 20.0
  environmental:
    ip_base: '10.150'
    department_pool:
    - ED
    - ICU
    - OR
    - MedSurg
    - Radiology
    - Pharmacy
    - Lab
    - Admin
    devices:
    - type: temp_humidity_sensor
      manufacturer: Sensirion
      model: SHT45
      firmware: '1.0.3'
      count: 20
      battery_powered: true
      metrics:
      - name: hospital.env.room_temperature_f
        type: gauge
        unit: Far
        range: [65, 80]
        drift: 0.3
      - name: hospital.env.humidity_pct
        type: gauge
        unit: '%'
        range: [30, 70]
        drift: 0.5
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
    - type: air_quality_sensor
      manufacturer: Honeywell
      model: HPM
      firmware: '2.1.0'
      count: 10
      battery_powered: false
      metrics:
      - name: hospital.env.air_quality_aqi
        type: gauge
        unit: '1'
        range: [10, 150]
        drift: 2.0
      - name: hospital.env.co2_ppm
        type: gauge
        unit: ppm
        range: [350, 1200]
        drift: 10.0
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
    - type: ups_battery
      manufacturer: Eaton
      model: 9PX 6000
      firmware: '03.02.0040'
      count: 6
      battery_powered: false
      metrics:
      - name: hospital.env.ups_load_pct
        type: gauge
        unit: '%'
        range: [10, 90]
        drift: 1.0
      - name: hospital.env.ups_runtime_min
        type: gauge
        unit: min
        range: [5, 120]
        drift: 0.5
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01
  asset_tracking:
    ip_base: '10.180'
    department_pool:
    - Facilities
    devices:
    - type: rtls_tag
      manufacturer: Zebra
      model: WhereTag IV
      firmware: '1.2.5'
      count: 50
      battery_powered: true
      metrics:
      - name: hospital.device.battery_pct
        type: gauge
        unit: '%'
        range: [5, 100]
        drift: 0.5
      - name: hospital.rtls.tag_rssi
        type: gauge
        unit: dBm
        range: [-90, -30]
        drift: 3.0
      - name: hospital.device.online
        type: gauge
        unit: '1'
        range: [0, 1]
        drift: 0.01

services:
- name: patient-portal
  language: java
  framework: Spring Boot
  operations:
  - name: "GET /api/appointments"
    latency_base_ms: 80
    latency_p99_ms: 450
    error_rate: 0.02
  - name: "POST /api/messages"
    latency_base_ms: 120
    latency_p99_ms: 600
    error_rate: 0.03
  - name: "GET /api/results"
    latency_base_ms: 95
    latency_p99_ms: 500
    error_rate: 0.015
  - name: "POST /api/checkin"
    latency_base_ms: 150
    latency_p99_ms: 800
    error_rate: 0.04
  dependencies:
  - service: clinical-workflow-engine
    operation: "POST /api/orders/route"
    probability: 0.3
- name: clinical-workflow-engine
  language: dotnet
  framework: ".NET 8"
  operations:
  - name: "POST /api/orders/route"
    latency_base_ms: 60
    latency_p99_ms: 300
    error_rate: 0.01
  - name: "GET /api/tasks"
    latency_base_ms: 45
    latency_p99_ms: 200
    error_rate: 0.008
  - name: "POST /api/workflow/execute"
    latency_base_ms: 100
    latency_p99_ms: 500
    error_rate: 0.02
  dependencies:
  - service: pharmacy-dispensing-api
    operation: "POST /api/dispense/verify"
    probability: 0.4
- name: nurse-call-integration
  language: python
  framework: FastAPI
  operations:
  - name: "POST /api/calls/route"
    latency_base_ms: 30
    latency_p99_ms: 150
    error_rate: 0.01
  - name: "GET /api/calls/active"
    latency_base_ms: 20
    latency_p99_ms: 80
    error_rate: 0.005
  - name: "POST /api/calls/escalate"
    latency_base_ms: 40
    latency_p99_ms: 200
    error_rate: 0.015
  dependencies:
  - service: bed-management-service
    operation: "GET /api/beds/status"
    probability: 0.5
- name: pharmacy-dispensing-api
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/dispense/verify"
    latency_base_ms: 90
    latency_p99_ms: 400
    error_rate: 0.02
  - name: "POST /api/dispense/authorize"
    latency_base_ms: 110
    latency_p99_ms: 500
    error_rate: 0.025
  - name: "GET /api/inventory"
    latency_base_ms: 50
    latency_p99_ms: 200
    error_rate: 0.01
  dependencies:
  - service: hl7-fhir-broker
    operation: "POST /api/fhir/MedicationRequest"
    probability: 0.6
- name: asset-management-platform
  language: go
  framework: stdlib
  operations:
  - name: "GET /api/assets/locate"
    latency_base_ms: 25
    latency_p99_ms: 120
    error_rate: 0.008
  - name: "POST /api/assets/track"
    latency_base_ms: 35
    latency_p99_ms: 150
    error_rate: 0.01
  - name: "GET /api/assets/history"
    latency_base_ms: 60
    latency_p99_ms: 300
    error_rate: 0.012
- name: bed-management-service
  language: python
  framework: Django
  operations:
  - name: "GET /api/beds/status"
    latency_base_ms: 40
    latency_p99_ms: 180
    error_rate: 0.01
  - name: "POST /api/beds/assign"
    latency_base_ms: 70
    latency_p99_ms: 350
    error_rate: 0.02
  - name: "POST /api/beds/discharge"
    latency_base_ms: 80
    latency_p99_ms: 400
    error_rate: 0.015
- name: medical-device-gateway
  language: java
  framework: Spring Boot
  operations:
  - name: "POST /api/telemetry/ingest"
    latency_base_ms: 15
    latency_p99_ms: 80
    error_rate: 0.005
  - name: "GET /api/devices/status"
    latency_base_ms: 30
    latency_p99_ms: 150
    error_rate: 0.01
  - name: "POST /api/devices/command"
    latency_base_ms: 50
    latency_p99_ms: 250
    error_rate: 0.02
  dependencies:
  - service: hl7-fhir-broker
    operation: "POST /api/hl7/translate"
    probability: 0.3
- name: hl7-fhir-broker
  language: dotnet
  framework: ".NET 8"
  operations:
  - name: "POST /api/fhir/MedicationRequest"
    latency_base_ms: 70
    latency_p99_ms: 350
    error_rate: 0.015
  - name: "POST /api/hl7/translate"
    latency_base_ms: 55
    latency_p99_ms: 250
    error_rate: 0.01
  - name: "GET /api/fhir/Patient"
    latency_base_ms: 40
    latency_p99_ms: 200
    error_rate: 0.008
- name: physician-mobile-app
  language: swift
  framework: SwiftUI
  operations:
  - name: "GET /api/patients/list"
    latency_base_ms: 90
    latency_p99_ms: 450
    error_rate: 0.025
  - name: "GET /api/orders/pending"
    latency_base_ms: 75
    latency_p99_ms: 350
    error_rate: 0.02
  - name: "POST /api/notes/dictation"
    latency_base_ms: 130
    latency_p99_ms: 600
    error_rate: 0.03
  dependencies:
  - service: clinical-workflow-engine
    operation: "GET /api/tasks"
    probability: 0.4

pinned_devices:
- type: infusion_pump
  manufacturer: BD
  model: Alaris 8015
  firmware: '12.1.3'
  floor: '3'
  wing: East
  department: ICU
  count: 4
- type: wireless_ap
  manufacturer: Cisco
  model: Catalyst 9130AX
  firmware: '17.9.4'
  floor: '3'
  wing: East
  department: Network
  count: 2
- type: patient_monitor
  manufacturer: Philips
  model: IntelliVue MX800
  firmware: '4.3.1'
  floor: '3'
  wing: East
  department: ICU
  count: 2
