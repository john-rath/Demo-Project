      - "dd-demo-toolkit:true"
      - "business_unit:Retail Banking"
    priority: 2

  - name: "[Finance] Trading Order Fill Rate Drop"
    type: "query alert"
    query: "avg(last_5m):sum:finserv.app.success_total{service_name:trading-platform,operation:fill_order} / sum:finserv.app.requests_total{service_name:trading-platform,operation:fill_order} * 100 < 98.5"
    message: "📊 Trading order fill rate dropped. Rate: {{value}}%. Check market data feed and risk engine."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Capital Markets"
      - "sla_critical:true"
