  - name: "[Finance] Payment Gateway Decline Rate Spike"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.payment_gateway.decline_rate_pct{region:us-east-1,environment:production} by {device_id} > 3.5"
    message: "❌ Payment decline rate spike on {{device_id}}. Rate: {{value}}%. Check fraud detection and fraud_detection_service latency."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Retail Banking"
