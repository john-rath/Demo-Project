  - name: "[Finance] Message Broker Consumer Lag Critical"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.message_broker.consumer_lag{region:us-east-1,environment:production} by {device_id} > 500"
    message: "📬 Kafka consumer lag critical on {{device_id}}. Lag: {{value}} messages. Check consumer processing rate."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Risk & Compliance"
    priority: 2

  - name: "[Finance] Database Connection Pool Exhaustion"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.database_cluster.connection_pool_pct{region:us-east-1,environment:production} by {device_id} > 85.0"
    message: "🔌 DB connection pool near capacity on {{device_id}}. Usage: {{value}}%. Check for connection leaks and slow queries."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Risk & Compliance"
    priority: 2

  - name: "[Finance] WAF Blocked Request Rate Spike"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.waf_appliance.blocked_rate_pct{region:us-east-1,environment:production} by {device_id} > 2.0"
    message: "🛡️ WAF blocking elevated on {{device_id}}. Rate: {{value}}%. Check for DDoS or malicious patterns."
