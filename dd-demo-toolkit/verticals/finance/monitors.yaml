  - name: "[Finance] Mobile Banking API Error Rate"
    type: "query alert"
    query: "avg(last_5m):sum:finserv.app.errors_total{service_name:mobile-banking-api,region:us-east-1} / sum:finserv.app.requests_total{service_name:mobile-banking-api,region:us-east-1} * 100 > 2.5"
    message: "📱 Mobile banking API error rate elevated. Rate: {{value}}%. Check biometric auth and push notification service."
    tags:
