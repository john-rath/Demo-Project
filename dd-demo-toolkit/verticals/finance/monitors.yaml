  - name: "[Finance] Loan Origination Credit Check Service Degradation"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.app.latency_ms{service_name:loan-origination-system,operation:credit_check_bureau} > 5000"
    message: "🏦 Credit check bureau latency spike. Avg: {{value}}ms. May be due to bureau API overload."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Retail Banking"
    priority: 2

  - name: "[Finance] Customer Data Platform KYC Verification Latency"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.app.latency_ms{service_name:customer-data-platform,operation:kyc_verify_identity} > 5000"
    message: "👤 KYC verification latency elevated. Avg: {{value}}ms. Check identity verification service."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Risk & Compliance"
    priority: 2

  - name: "[Finance] HSM Key Slot Utilization Critical"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.hsm_module.key_slots_used_pct{region:us-east-1,environment:production} > 90"
    message: "🔑 HSM key slots near capacity on {{device_id}}. Usage: {{value}}%. Key management team should rotate/archive old keys."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "business_unit:Risk & Compliance"
    priority: 2
