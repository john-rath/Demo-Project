slos:
  - name: "Online Banking Availability"
    description: "Customer-facing online/mobile banking portal must be available 99.99% of the time. Critical for retail customer experience and regulatory compliance."
    type: metric
    target: 99.99
    timeframe: "30d"
    query:
      numerator: "sum:finserv.app.requests_total{service_name:online-banking-portal}.as_count() - sum:finserv.app.errors_total{service_name:online-banking-portal}.as_count()"
      denominator: "sum:finserv.app.requests_total{service_name:online-banking-portal}.as_count()"
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "business_unit:Retail Banking"
      - "tier:Tier 1"
      - "sla_critical:true"

  - name: "Payment Processing Availability"
    description: "99.5% of payment authorization requests must succeed. Tracks error rate for the payment processing engine; failures indicate gateway timeouts, downstream dependency issues, or capacity constraints."
    type: metric
    target: 99.5
    timeframe: "30d"
    query:
      numerator: "sum:finserv.app.requests_total{service_name:payment-processing-engine}.as_count() - sum:finserv.app.errors_total{service_name:payment-processing-engine}.as_count()"
      denominator: "sum:finserv.app.requests_total{service_name:payment-processing-engine}.as_count()"
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "business_unit:Retail Banking"
      - "tier:Tier 1"
      - "sla_critical:true"

  - name: "Fraud Detection Service Availability"
    description: "Fraud detection service must successfully score 99% of transactions. Failures indicate model serving issues, feature pipeline delays, or HSM dependency problems that increase fraud risk exposure."
    type: metric
    target: 99.0
    timeframe: "30d"
    query:
      numerator: "sum:finserv.app.requests_total{service_name:fraud-detection-service}.as_count() - sum:finserv.app.errors_total{service_name:fraud-detection-service}.as_count()"
      denominator: "sum:finserv.app.requests_total{service_name:fraud-detection-service}.as_count()"
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "business_unit:Risk & Compliance"
      - "tier:Tier 1"
      - "sla_critical:true"

  - name: "Trading Platform Order Fill Rate"
    description: "Trading platform must successfully fill 99.9% of submitted orders. Lower rates indicate risk engine, matching engine, or market data issues impacting revenue."
    type: metric
    target: 99.9
    timeframe: "30d"
    query:
      numerator: "sum:finserv.app.success_total{service_name:trading-platform,operation:fill_order}.as_count()"
      denominator: "sum:finserv.app.requests_total{service_name:trading-platform,operation:fill_order}.as_count()"
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "business_unit:Capital Markets"
      - "tier:Tier 1"
      - "sla_critical:true"
