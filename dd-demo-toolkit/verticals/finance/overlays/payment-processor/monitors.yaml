# Payment Processor overlay monitors — signal chain for the auth cascade
# incident story (Chapter 2) and OTel collector health (Chapter 2 Fleet
# Automation story).
#
# Monitor message fields are written for Bits AI legibility: each message
# states what metric crossed what threshold, which device/service is
# affected, and what the downstream business impact is. Vague messages
# produce vague Bits AI responses.
#
# Tag scheme strictly follows existing finance keyspace (CLAUDE.md §6.3).
# Per STYLE_GUIDE.md §1.3: one threshold per monitor (no || / &&).

monitors:

  # ----- signal_chain:1-root-cause -------------------------------------
  # Customer-facing payment failures — the alert that opens the Bits AI
  # investigation. Root cause: Redis cache cluster capacity degradation
  # → authorization-engine falls through to PostgreSQL → auth latency
  # exceeds switch timeout → decline responses on timed-out transactions.

  - name: "[Finance/Payment Processor] Authorization Decline Rate Spike"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.authorization.decline_rate_pct{device_type:authorization_switch} by {region} > 5"
    message: "📉 Authorization decline rate >5% on authorization_switch devices in {{region.name}} (baseline: ~1.5%). Customer-facing payment failures are occurring. Root: Redis cache cluster capacity degradation → authorization-engine cache misses → auth latency exceeds switch timeout → decline responses on timed-out transactions. Correlate with `finserv.cache_cluster.hit_rate_pct` and `finserv.cache_cluster.eviction_rate` on `device_type:cache_cluster` — all three should be elevated. Open the runbook notebook for the full cascade walkthrough."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "team:Payments"
      - "incident_domain:payment-authorization"
      - "signal_chain:1-root-cause"
      - "compliance:pci-dss"
    priority: 1
    runbook_notebook_name: "Incident Investigation: Payment Authorization Cascade"

  - name: "[Finance/Payment Processor] Fraud Switch False Positive Rate Elevated"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.authorization.false_positive_rate_pct{device_type:fraud_switch} by {region} > 6"
    message: "🔍 Fraud switch false positive rate >6% in {{region.name}} (baseline: ~1.5%). Legit transactions are being blocked. Root: auth retry storm from degraded authorization_switch is overwhelming the fraud scoring model — feature vectors arriving out-of-sequence. Clearing queue will begin growing as declined transactions require manual review."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "team:Payments"
      - "incident_domain:payment-authorization"
      - "signal_chain:2-leading-indicator"
    priority: 2

  # ----- signal_chain:3-symptom ----------------------------------------
  # Downstream effects: clearing queue backs up, settlement gateway errors.

  - name: "[Finance/Payment Processor] Clearing Queue Backlog Critical"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.clearing.queue_depth{device_type:clearing_node} by {region} > 15000"
    message: "📦 Clearing queue depth >15,000 on clearing_node in {{region.name}} (baseline: ~2,000). Settlement SLA is at risk — transactions awaiting clearing are growing faster than they are processed. Root cause is upstream auth decline spike reducing the rate of complete transaction records entering the clearing pipeline. Settlement gateway timeout errors will follow within 5–10 min."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "team:Payments"
      - "incident_domain:payment-authorization"
      - "signal_chain:3-symptom"
      - "compliance:pci-dss"
    priority: 1

  - name: "[Finance/Payment Processor] Settlement Gateway Error Rate"
    type: "query alert"
    query: "avg(last_5m):avg:finserv.clearing.settlement_failures_total{device_type:settlement_gateway} by {region} > 3"
    message: "⛔ Settlement gateway failures >3/tick on settlement_gateway in {{region.name}}. Fund transfers to SWIFT/ACH counterparties are failing — regulatory reporting obligations may be impacted if settlement does not complete within the cut-off window. Upstream: clearing queue is saturated; auth cascade must be resolved first."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "team:Payments"
      - "incident_domain:payment-authorization"
      - "signal_chain:3-symptom"
      - "compliance:pci-dss"
    priority: 1

  # ----- OTel collector health -----------------------------------------
  # Surfaces in Chapter 2 Fleet Automation story: "OTel data loss before
  # the pipeline even reaches Datadog" — no OpAMP equivalent for this.

  - name: "[Finance/Payment Processor] OTel Collector Span Drop Rate"
    type: "query alert"
    query: "avg(last_5m):sum:otelcol_receiver_refused_spans{job:otel-collector} > 500"
    message: "📡 OTel collector is refusing >500 spans/interval (job:otel-collector). Traces from tokenization-service and authorization-engine may be incomplete, which will break single-pane-of-glass drilldown. Check collector queue depth and memory limits. Fleet Automation shows collector config version and last-seen timestamp — compare against last push."
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:dd-demo-finance"
      - "team:Payments"
      - "incident_domain:payment-authorization"
    priority: 2
