  # -----------------------------------------------------------------------
  # Chapter 2 — OTel baseline incident RCA
  # -----------------------------------------------------------------------
  - id: "pp-auth-cascade-investigation"
    name: "Incident Investigation: Payment Authorization Cascade"
    type: investigation
    description: "RCA walkthrough for the payment authorization cascade: Redis cache capacity degrades, driving auth switch latency up, fraud switch false positive rate climbs, clearing queue backs up, settlement gateway errors surface."
    time_range: "4h"
    tags:
      - "vertical:finance"
      - "dd-demo-toolkit:true"
      - "team:Payments"
      - "incident_domain:payment-authorization"
      - "signal_chain_root:auth-decision-latency"
    cells:

      - attributes:
          definition:
            type: "markdown"
            text: |
              # Incident Investigation: Payment Authorization Cascade

              **Alert:** `[Finance/Payment Processor] Authorization Decline Rate Spike` fired
              in ap-southeast-1. Settlement gateway error rate climbing. Customer transactions
              failing at volume.

              Three things are true at once: decline rate is up, fraud switch false positives
              are elevated, and clearing queue depth is growing. The instinct is to check the
              fraud switch first — that's wrong. The fraud system is a victim, not a cause.

              **Walk upstream.** Start from what fired the alert, then follow the dependency
              chain backwards until you find what changed first.

              > **Demo note:** A skilled SRE walks this path in 30–40 minutes. Bits AI SRE
              > surfaces the same causal chain in under 3 minutes — before the clearing queue
              > hits the depth that creates SWIFT/ACH regulatory risk.

              ---
              ## Step 1 — Start where the alert fired: decline rate + fraud false positives
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            show_legend: true
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "declines"
                    query: "avg:finserv.authorization.decline_rate_pct{device_type:authorization_switch} by {region}"
                  - data_source: "metrics"
                    name: "fp_rate"
                    query: "avg:finserv.authorization.false_positive_rate_pct{device_type:fraud_switch} by {region}"
                formulas:
                  - formula: "declines"
                    alias: "Decline rate %"
                  - formula: "fp_rate"
                    alias: "Fraud FP rate %"
                display_type: "line"
            markers:
              - value: "y = 5"
                display_type: "error dashed"
                label: "Decline alert threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Decline rate is above 5%. Fraud false positives are elevated in the same window —
              this is the retry storm signature. But the fraud switch didn't cause this; it's
              overloaded *because* something upstream is timing out and triggering retries.

              ---
              ## Step 2 — One hop upstream: authorization decision latency
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            show_legend: true
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "latency"
                    query: "avg:finserv.authorization.decision_latency_ms{device_type:authorization_switch} by {region}"
                formulas:
                  - formula: "latency"
                    alias: "Auth decision latency (ms)"
                display_type: "line"
            markers:
              - value: "y = 180"
                display_type: "error dashed"
                label: "Switch timeout threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Auth decision latency has spiked past the 180ms switch timeout threshold.
              Every transaction exceeding 180ms is timed out, counted as a decline, and
              retried — which is what's overloading the fraud switch. Authorization-engine
              is slow. Why?

              ---
              ## Step 3 — Two hops upstream: cache miss fallthrough to PostgreSQL
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            show_legend: true
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "hit_rate"
                    query: "avg:finserv.cache_cluster.hit_rate_pct{device_type:cache_cluster} by {region}"
                  - data_source: "metrics"
                    name: "eviction"
                    query: "avg:finserv.cache_cluster.eviction_rate{device_type:cache_cluster} by {region}"
                formulas:
                  - formula: "hit_rate"
                    alias: "Cache hit rate %"
                  - formula: "eviction"
                    alias: "Eviction rate /s"
                display_type: "line"
            markers:
              - value: "y = 85"
                display_type: "error dashed"
                label: "Hit rate degradation threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Cache hit rate has collapsed and eviction rate is maxed. Authorization-engine
              falls through to PostgreSQL for lookups that are normally cache hits — adding
              ~220ms of latency per decision. **This is the root cause.**

              Cache degradation precedes the auth latency spike by 1–2 minutes, confirming
              it's causal, not coincidental. The retry storm (decline rate + fraud FP) is two
              hops downstream from this single infrastructure failure.

              ---
              ## Step 4 — Downstream damage: clearing queue backlog
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            show_legend: true
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "queue"
                    query: "avg:finserv.clearing.queue_depth{device_type:clearing_node} by {region}"
                formulas:
                  - formula: "queue"
                    alias: "Clearing queue depth"
                display_type: "line"
            markers:
              - value: "y = 15000"
                display_type: "error dashed"
                label: "Critical threshold"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Declined transactions queue for manual review. Queue depth grows at 3–4× normal
              rate once decline rate exceeds 5%. This is now a race against the SWIFT/ACH
              cut-off window.

              ---
              ## Step 5 — Terminal symptom: settlement gateway failures
        type: "notebook_cells"

      - attributes:
          definition:
            type: "timeseries"
            show_legend: true
            requests:
              - response_format: "timeseries"
                queries:
                  - data_source: "metrics"
                    name: "failures"
                    query: "avg:finserv.clearing.settlement_failures_total{device_type:settlement_gateway} by {region}"
                formulas:
                  - formula: "failures"
                    alias: "Settlement failures"
                display_type: "line"
        type: "notebook_cells"

      - attributes:
          definition:
            type: "markdown"
            text: |
              Settlement gateway starts failing once clearing queue hits critical depth.
              SWIFT/ACH cut-off windows create regulatory risk if not resolved within 20 min.

              ---
              ## Step 6 — Recovery timeline

              Redis cache cluster capacity restored → cache hit rate recovers →
              authorization-engine cache hits resume → auth latency returns to ~65ms baseline
              → fraud switch normalizes → clearing drains → settlement gateway error rate
              drops to zero.

              **Time to resolution:** ~22 min (ramp_up + degraded + cascading + recovery phases).
              **Bits AI identified root cause** (Redis cache cluster capacity degradation —
              eviction rate maxed, active connections dropped ~83%) within 3 min of the first
              alert — before clearing queue reached critical depth.
        type: "notebook_cells"

      - attributes:
          definition:
            type: "query_table"
            requests:
              - response_format: "scalar"
                queries:
                  - data_source: "metrics"
                    name: "peak_latency"
                    query: "max:finserv.authorization.decision_latency_ms{device_type:authorization_switch}"
                    aggregator: "max"
                  - data_source: "metrics"
                    name: "peak_declines"
                    query: "max:finserv.authorization.decline_rate_pct{device_type:authorization_switch}"
                    aggregator: "max"
                  - data_source: "metrics"
                    name: "peak_queue"
                    query: "max:finserv.clearing.queue_depth{device_type:clearing_node}"
                    aggregator: "max"
                formulas:
                  - formula: "peak_latency"
                    alias: "Peak auth latency (ms)"
                  - formula: "peak_declines"
                    alias: "Peak decline rate %"
                  - formula: "peak_queue"
                    alias: "Peak clearing queue"
        type: "notebook_cells"

