            type: "markdown"
            text: |
              ---

              ## 3. Workflow Automation

              > **"Agentic remediation without a human in the loop."**

              The **Authorization Anomaly Auto-Triage** workflow is triggered by the
              Authorization Decline Rate Spike monitor. Steps:

              1. Enrich context with current payment volume from Datadog metrics
              2. Query fraud switch false positive rate to confirm retry-storm signature
              3. Post summary to #payments-ops Slack channel
              4. Create investigation case in Datadog Case Management with linked monitors

              The workflow runs automatically — the on-call engineer receives a pre-diagnosed
              case rather than a raw alert. For a deeper auth outage, a follow-on workflow
              step can trigger a fraud scoring config rollback via the authorization-engine API.

              > Open the workflow in Datadog Workflow Automation to show the visual step
              > editor. Do not run it live during the demo — demonstrate the design, not execution.
