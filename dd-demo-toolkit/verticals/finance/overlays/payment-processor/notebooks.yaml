            text: |
              # Unit Economics Reference: Datadog Cost Drivers

              > **Not a number — a structure.**
              > This notebook gives your finance stakeholders the vocabulary to
              > ask the right questions. Actual pricing requires a formal sizing
              > exercise against your traffic volumes.

              ---

              ## Datadog Products and Their Billing Units

              | Product | Billing unit | Relevant for payment processor |
              |---------|-------------|-------------------------------|
              | **APM** | Host-hour + span GB ingested | authorization-engine, tokenization-service, clearing-processor, settlement-gateway |
              | **Infrastructure Monitoring** | Host-hour | All service hosts + authorization_switch, tokenization_vault device hosts |
              | **Log Management** | GB ingested + GB indexed | Authorization decision logs, PCI audit trail, settlement confirmation logs |
              | **RUM** | Session | Customer-facing payment UI (if applicable) |
              | **NPM** | Host-hour | Network paths between tokenization vault, auth switch, clearing node |
              | **Synthetics** | Test run | End-to-end payment flow synthetic monitors |
              | **Database Monitoring** | Host-hour (DB host) | authorization-engine DB cluster |
              | **Observability Pipelines** | GB processed | Log routing and PCI-scope redaction pipeline |

              ---

              ## Per-Service Cost Driver Mapping

              | Service | Primary cost drivers | Notes |
              |---------|---------------------|-------|
              | `tokenization-service` | APM + Infra | High TPS → significant span volume; HSM vault hosts are infra-billed |
              | `authorization-engine` | APM + Infra + DBM | DB call per transaction → DBM host billing; span volume scales with TPS |
              | `clearing-processor` | APM + Infra + Logs | Batch processing logs are large; archive for 7-year PCI retention |
              | `settlement-gateway` | APM + Infra + Logs | Settlement confirmation logs have regulatory retention requirements |

              ---

              ## Cost Levers

              1. **Sampling:** Keep 100% of error spans, 10% of success spans via Observability Pipelines → reduces APM span GB by ~70% without losing fidelity on failures
              2. **Log tiering:** Route debug logs to low-cost Flex Logs; keep error + audit logs in standard index
              3. **Retention:** Set APM retention to match compliance requirements (7 years for PCI-DSS) only on payment auth traces — use shorter retention for clearing-processor debug spans
        type: "notebook_cells"
