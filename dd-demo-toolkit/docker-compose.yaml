volumes:
  sensing-pgdata: {}
  # Ephemeral volume shared between simulator and authorization-db-worker.
  # The cascade plugin writes the current phase here; the db-worker reads it
  # to choose normal vs. degraded query patterns.
  cascade-state: {}
  # PostgreSQL log files written by authorization-db, tailed by datadog-agent-pp.
  # Using a named volume instead of a bind-mount keeps paths consistent across
  # macOS and Linux without needing to pre-create the host directory.
  pg-logs: {}
