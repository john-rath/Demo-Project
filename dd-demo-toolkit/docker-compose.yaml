    command: ["ddtrace-run", "uvicorn", "care_portal:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      datadog-agent-sh: {condition: service_started}
      care-summary-api: {condition: service_started}
    ports:
      # Exposed on the host so a browser (or a Datadog Synthetic private
      # location worker) can load the RUM-instrumented page.
      - "8800:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - SUMMARY_URL=http://care-summary-api:8080
      # RUM browser SDK credentials. Resolved by `op run` (DD_CLIENT_TOKEN is a
      # public-by-design browser token but stored as an op:// ref per policy);
      # served to the browser at runtime via /config.js, never baked in.
      - DD_RUM_APPLICATION_ID=${DD_RUM_APPLICATION_ID:-}
      - DD_CLIENT_TOKEN=${DD_CLIENT_TOKEN:-}
      - DD_AGENT_HOST=datadog-agent-sh
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=care-portal
      - DD_ENV=demo
      - DD_VERSION=1.0.0
