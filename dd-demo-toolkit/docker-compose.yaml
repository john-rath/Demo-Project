services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: dd-demo-otel-collector
    command:
      - "--config=/etc/otel-collector-config.yaml"
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    # IMPORTANT: do NOT use env_file: for DD_API_KEY here. If .env holds
    # the value as an op:// reference (corp policy), env_file would inject
    # the literal "op://..." string into the container — the collector
    # would then try to use that as the API key and fail. Instead we read
    # from the compose shell environment via ${DD_API_KEY:?...}, which is
    # populated by `op run --env-file=.env --` (Makefile targets do this).
    # The :? expansion gives a clear failure if you bypass the Makefile
    # and forget to wrap docker compose in op run yourself.
    environment:
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up`, or wrap with `op run --env-file=.env -- docker compose ...`}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_HOSTNAME=finance-simulator
      - GOGC=80

  simulator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dd-demo-simulator
    depends_on:
      otel-collector:
        condition: service_started
    env_file:
      - .env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - PYTHONUNBUFFERED=1
      # DD_DEMO_VERTICAL and the optional DD_DEMO_SUB_VERTICAL come from
      # .env via env_file above. When DD_DEMO_SUB_VERTICAL is set
      # (e.g. "bd"), the Dockerfile CMD appends --sub-vertical so the
      # overlay's plugins load alongside base-vertical plugins.
    volumes:
      # Shared with authorization-db-worker (dbm profile) so the cascade plugin
      # can write the current phase and the DB worker can read it. When the dbm
      # profile is not active this volume is still mounted but /cascade-state
      # is simply never read.
      - cascade-state:/cascade-state
    restart: unless-stopped

  setup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dd-demo-setup
    entrypoint: ["sh", "-c"]
    # When DD_DEMO_SUB_VERTICAL is set (e.g. "bd"), the overlay's
    # monitors, dashboards, notebooks, SLOs, services, workflows, and
    # cases are deployed on top of the base vertical's resources. The
    # ${VAR:+...} expansion only adds the flag when the var is non-empty.
    command: ['dd-demo setup --vertical "$$DD_DEMO_VERTICAL" --clean $${DD_DEMO_SUB_VERTICAL:+--sub-vertical "$$DD_DEMO_SUB_VERTICAL"}']
    # `env_file` injects non-secret config from .env into the container.
    # The :? overrides below pull DD_API_KEY / DD_APP_KEY from the compose
    # shell env (populated by `op run`), so the op:// reference in .env
    # never reaches the container as a literal — see otel-collector for
    # the full rationale.
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make setup`}
      - DD_APP_KEY=${DD_APP_KEY:?DD_APP_KEY not set — run via `make setup`}
    restart: "no"
    profiles:
      - setup

  # Single-vertical teardown. Targets the vertical in DD_DEMO_VERTICAL
  # (defaults to "healthcare"). Equivalent of:
  #   dd-demo teardown --vertical <vertical> --force
  teardown:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dd-demo-teardown
    entrypoint: ["sh", "-c"]
    command: ['dd-demo teardown --vertical "$$DD_DEMO_VERTICAL" --force']
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make teardown`}
      - DD_APP_KEY=${DD_APP_KEY:?DD_APP_KEY not set — run via `make teardown`}
    restart: "no"
    profiles:
      - teardown

  # Nuke-everything sweep. Deletes every resource tagged
  # "dd-demo-toolkit:true" across ALL verticals, including orphans from
  # renamed/removed verticals. Equivalent of:
  #   dd-demo teardown --all-verticals --force
  teardown-all:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dd-demo-teardown-all
    command: ["dd-demo", "teardown", "--all-verticals", "--force"]
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make teardown-all`}
      - DD_APP_KEY=${DD_APP_KEY:?DD_APP_KEY not set — run via `make teardown-all`}
    restart: "no"
    profiles:
      - teardown-all

  # =========================================================================
  # Data Streams Monitoring stack — EY CT Consulting AOP demo
  # =========================================================================
  # All services here run only when the `data-obs` profile is supplied
  # (e.g. via `make up-data-obs`). The default `make up` flow is untouched.
  #
  # Why a separate Datadog Agent here when otel-collector handles the rest:
  # DSM is an APM feature that needs the dd-trace-py SDK + the Datadog
  # Agent's APM intake on :8126. The OTel collector doesn't ingest DSM
  # pathways. The two run side-by-side in this compose network; the
  # simulator container talks to the otel-collector, the three Python
  # workers below talk to the dd-agent.

  kafka:
    image: bitnami/kafka:3.7
    container_name: dd-demo-kafka
    # KRaft single-node mode — no Zookeeper needed. Good enough for a
    # single-broker demo; not for production.
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - ALLOW_PLAINTEXT_LISTENER=yes
    healthcheck:
      # The producer / pipeline / eval workers all wait on this so they
      # don't crash-loop while Kafka is still electing the controller.
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    profiles:
      - data-obs

  # Datadog Agent — terminus for dd-trace-py spans + DSM stats from the
  # three Python workers. Same secret-handling pattern as the otel-collector:
  # never use env_file for DD_API_KEY, always require it from the compose
  # shell env via :? (populated by `op run`).
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    container_name: dd-demo-datadog-agent
    environment:
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up-data-obs`}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_DATA_STREAMS_ENABLED=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_CONTAINER_EXCLUDE=name:dd-demo-kafka
      - DD_TAGS=dd-demo-toolkit:true vertical:finance incident_domain:ai-eval-pipeline env:demo
    volumes:
      # Process + container discovery so the agent can attach the right
      # service / version tags to traces and logs.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    restart: unless-stopped
    profiles:
      - data-obs

  data-obs-producer:
    build:
      context: ./data_obs
      dockerfile: Dockerfile
    container_name: dd-demo-data-producer
    command: ["python", "producer.py"]
    depends_on:
      kafka:
        condition: service_healthy
      datadog-agent:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC_RAW=risk-feature-events-raw
      - PRODUCER_INTERVAL_SEC=1.5
      # dd-trace-py wiring
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=risk-data-ingester
      - DD_ENV=demo
      - DD_VERSION=1.0.0
      - DD_TRACE_ENABLED=true
      - DD_DATA_STREAMS_ENABLED=true
      - DD_LOGS_INJECTION=true
      - DD_TAGS=dd-demo-toolkit:true vertical:finance incident_domain:ai-eval-pipeline team:Risk & Compliance
    restart: unless-stopped
    profiles:
      - data-obs

  data-obs-feature-pipeline:
    build:
      context: ./data_obs
      dockerfile: Dockerfile
    container_name: dd-demo-feature-pipeline
    command: ["python", "feature_pipeline.py"]
    depends_on:
      kafka:
        condition: service_healthy
      datadog-agent:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC_RAW=risk-feature-events-raw
      - KAFKA_TOPIC_ENRICHED=risk-eval-jobs
      - KAFKA_GROUP_ID=risk-feature-pipeline
      # Default low fault rate. Bump live (e.g. via `docker compose exec`
      # or compose override file) during the data-quality cascade demo.
      - DATA_QUALITY_FAULT_PCT=0.02
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=risk-feature-pipeline
      - DD_ENV=demo
      - DD_VERSION=1.0.0
      - DD_TRACE_ENABLED=true
      - DD_DATA_STREAMS_ENABLED=true
      - DD_LOGS_INJECTION=true
      - DD_TAGS=dd-demo-toolkit:true vertical:finance incident_domain:ai-eval-pipeline team:Risk & Compliance
    restart: unless-stopped
    profiles:
      - data-obs

  # --- Postgres warehouse + dbt-runner for Data Observability ----------
  # The dbt sub-stack lights up Datadog's Data Observability product UI
  # (separate from DSM): model lineage DAG, freshness, schema tests.
  # Builds on the same `data-obs` profile so a single `make up-data-obs`
  # spins up DSM + Data Quality in one shot.

  postgres:
    image: postgres:16-alpine
    container_name: dd-demo-postgres
    environment:
      - POSTGRES_USER=dbt
      - POSTGRES_PASSWORD=dbt
      - POSTGRES_DB=ey_risk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dbt -d ey_risk"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    profiles:
      - data-obs

  data-obs-dbt-runner:
    build:
      context: ./data_obs
      dockerfile: dbt_runner/Dockerfile
    container_name: dd-demo-dbt-runner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - DBT_POSTGRES_HOST=postgres
      - DBT_POSTGRES_PORT=5432
      - DBT_POSTGRES_USER=dbt
      - DBT_POSTGRES_PASSWORD=dbt
      - DBT_POSTGRES_DB=ey_risk
      - DBT_POSTGRES_SCHEMA=analytics
      - DBT_RUN_INTERVAL_SEC=600
      - DBT_SERVICE_NAME=analytics-dbt-runner
      - DD_ENV=demo
      - DD_SITE=${DD_SITE:-datadoghq.com}
      # DD_API_KEY required for the artifact upload to Datadog Data
      # Observability. Same secret-handling pattern as the rest of the
      # stack — sourced from the compose shell env (populated by op run),
      # never from a literal in .env.
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up-data-obs`}
    restart: unless-stopped
    profiles:
      - data-obs

  # IMPORTANT: DD_SERVICE here intentionally matches the LangGraph service
  # name from verticals/finance/overlays/ey.yaml so Service Catalog shows
  # one entity with both DSM lineage + LLM Obs evals.
  # --- LLM Obs Experiment continuous runner -------------------------------
  # Runs the EY Risk Portfolio evaluation experiment on a 3-minute loop
  # (gpt-4.5 vs gpt-4o-mini head-to-head). Part of the default telemetry
  # generation stack — comes up with `make up` alongside the simulator.
  # Each cycle adds two new runs under the stable experiment names so
  # Datadog shows a continuous F1 / precision / recall trend.
  llm-experiment:
    build:
      context: ./data_obs/llm_experiments
      dockerfile: Dockerfile
    container_name: dd-demo-llm-experiment
    environment:
      - PYTHONUNBUFFERED=1
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up`}
      - DD_APP_KEY=${DD_APP_KEY:?DD_APP_KEY not set — run via `make up`}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - EXPERIMENT_PROJECT=${EXPERIMENT_PROJECT:-EY Risk Portfolio Eval}
      - EXPERIMENT_DATASET=${EXPERIMENT_DATASET:-ey_risk_portfolio_eval_v1}
      - EXPERIMENT_INTERVAL_SEC=${EXPERIMENT_INTERVAL_SEC:-180}
      # Set EXPERIMENT_MODEL to limit to a single model; default runs
      # both gpt-4.5 and gpt-4o-mini head-to-head every cycle.
      - EXPERIMENT_MODEL=${EXPERIMENT_MODEL:-}
    restart: unless-stopped

  data-obs-eval-consumer:
    build:
      context: ./data_obs
      dockerfile: Dockerfile
    container_name: dd-demo-eval-consumer
    command: ["python", "eval_consumer.py"]
    depends_on:
      kafka:
        condition: service_healthy
      datadog-agent:
        condition: service_started
    environment:
      - PYTHONUNBUFFERED=1
      - KAFKA_BOOTSTRAP=kafka:9092
      - KAFKA_TOPIC_ENRICHED=risk-eval-jobs
      - KAFKA_GROUP_ID=risk-eval-agent
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=risk-eval-agent
      - DD_ENV=demo
      - DD_VERSION=1.0.0
      - DD_TRACE_ENABLED=true
      - DD_DATA_STREAMS_ENABLED=true
      - DD_LOGS_INJECTION=true
      - DD_TAGS=dd-demo-toolkit:true vertical:finance incident_domain:ai-eval-pipeline team:Risk & Compliance
    restart: unless-stopped
    profiles:
      - data-obs

  # =========================================================================
  # DBM stack — authorization-engine database demo (any vertical)
  # =========================================================================
  # All services here run only when the `dbm` profile is supplied.
  # Activate via DD_DEMO_DBM=true in .env (any vertical/sub-vertical) or
  # automatically when DD_DEMO_SUB_VERTICAL=payment-processor (backward compat).
  # The default `make up` flow is untouched when neither condition is set.
  #
  # What this adds:
  #   authorization-db       — Postgres 16 representing the auth engine's DB
  #   datadog-agent-pp       — Dedicated Datadog Agent with DBM enabled
  #   authorization-db-worker — SQL workload generator; degrades in sync with
  #                             the cascade plugin via the cascade-state volume
  #
  # Demo story: during the auth cascade, the DB worker runs sequential scans and
  # holds connections open, driving connection pool exhaustion. The Datadog DBM
  # "Top Queries" view shows the slow fingerprint climbing alongside the auth
  # decision latency spike — demonstrating that DB wait time amplifies the cascade.

  authorization-db:
    image: postgres:16-alpine
    container_name: dd-demo-authorization-db
    # Cap max_connections to 20 so the db-worker can visibly exhaust the pool
    # during cascading phase (it opens up to 18 connections).
    #
    # Logging configuration — writes to /var/log/postgresql/postgresql.log (shared
    # volume) so datadog-agent-pp can tail the file directly with type:file in its
    # postgres conf.d. Container-based Autodiscovery log collection is unavailable
    # on macOS because the agent's workloadmeta Docker collector times out listing
    # images via the Docker Desktop socket.
    #
    #   log_min_duration_statement=100  — log any query ≥ 100 ms; catches the
    #     sequential scans and full-table scans during cascade phases.
    #   log_connections / log_disconnections — connection lifecycle events;
    #     shows pool growth/exhaustion during the cascading phase.
    #   log_lock_waits — log waits > deadlock_timeout; surfaces SELECT FOR UPDATE
    #     contention during the degraded phase.
    #   log_line_prefix — format expected by Datadog's postgresql log pipeline.
    #   logging_collector=on — redirect logs to a file instead of stderr.
    #   log_directory / log_filename — write to the shared pg-logs volume.
    command:
      - "postgres"
      - "-c"
      - "max_connections=20"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "track_activity_query_size=4096"
      - "-c"
      - "log_min_duration_statement=100"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_line_prefix=%m [%p] %q%u@%d "
      - "-c"
      - "logging_collector=on"
      - "-c"
      - "log_directory=/var/log/postgresql"
      - "-c"
      - "log_filename=postgresql.log"
      - "-c"
      - "log_rotation_age=0"
      - "-c"
      - "log_rotation_size=0"
    environment:
      - POSTGRES_USER=auth
      - POSTGRES_PASSWORD=auth
      - POSTGRES_DB=authorization_engine
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./docker/postgres/authorization-engine/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/postgres/authorization-engine/entrypoint.sh:/entrypoint.sh:ro
      - pg-logs:/var/log/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d authorization_engine"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    profiles:
      - dbm

  # Datadog Agent dedicated to DBM — focused solely on postgres integration.
  # Same secret-handling pattern as the rest of the stack (no env_file for
  # DD_API_KEY; requires op run via `make up-payment-processor`).
  datadog-agent-pp:
    image: gcr.io/datadoghq/agent:7
    container_name: dd-demo-datadog-agent-pp
    depends_on:
      authorization-db:
        condition: service_healthy
    environment:
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up`}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_HOSTNAME=authorization-db
      - DD_APM_ENABLED=false
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=false
      - DD_PROCESS_AGENT_ENABLED=false
      - DD_DEMO_VERTICAL=${DD_DEMO_VERTICAL:-finance}
      - DD_TAGS=service:authorization-engine env:demo vertical:${DD_DEMO_VERTICAL:-finance} dd-demo-toolkit:true
    volumes:
      - ./docker/datadog/dbm/conf.d:/etc/datadog-agent/conf.d:ro
      # Shared log volume — agent tails postgresql.log written by authorization-db.
      # Log source config is in conf.d/postgres.d/conf.yaml (logs: section).
      - pg-logs:/var/log/postgresql:ro
    restart: unless-stopped
    profiles:
      - dbm

  # SQL workload generator — mimics real authorization-engine query patterns
  # and degrades them in sync with the cascade plugin (reads phase.json from
  # the cascade-state volume that the simulator writes).
  authorization-db-worker:
    build:
      context: ./docker/authorization-db-worker
      dockerfile: Dockerfile
    container_name: dd-demo-authorization-db-worker
    depends_on:
      authorization-db:
        condition: service_healthy
    environment:
      - DB_HOST=authorization-db
      - DB_USER=auth
      - DB_PASSWORD=auth
      - DB_NAME=authorization_engine
      - PYTHONUNBUFFERED=1
      - DD_DEMO_VERTICAL=${DD_DEMO_VERTICAL:-finance}
      # OTel trace export — routes to the shared otel-collector on the same network.
      # Traces are emitted as service:authorization-db so APM and the DBM entity page
      # both get "View traces" populated.
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_SERVICE_NAME=authorization-db
      - OTEL_RESOURCE_ATTRIBUTES=deployment.environment.name=demo,team=Payments,dd-demo-toolkit=true,vertical=${DD_DEMO_VERTICAL:-finance},host.name=authorization-db
    # Datadog Autodiscovery labels — instruct datadog-agent-pp to collect logs from
    # this container and tag them with service:authorization-db so the DBM entity page
    # and dashboard widget "View logs" links have data to navigate into.
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "authorization-db", "tags": ["env:demo", "vertical:${DD_DEMO_VERTICAL:-finance}", "team:Payments", "dd-demo-toolkit:true", "incident_domain:payment-authorization"]}]'
    volumes:
      - cascade-state:/cascade-state
    restart: unless-stopped
    profiles:
      - dbm

  # ===========================================================================
  # Sensing Hospital mock environment — `mock-app` profile (DD_DEMO_MOCK_FLEET).
  #
  # A real containerized microservice app + mock IoT edge fleet, collected by
  # the ACTUAL Datadog Agent (not the OTel collector): APM service map, traces,
  # logs, and process/container infra. Mirrors the AdventHealth overlay's
  # on-prem→cloud care-experience cascade so the live app reinforces the
  # synthetic story. Gated by its own profile so `make up` is unchanged.
  # ===========================================================================

  # Dedicated Datadog Agent for the mock app (distinct from the data-obs /
  # dbm agents so the profiles compose cleanly when run together).
  datadog-agent-sh:
    image: gcr.io/datadoghq/agent:7
    container_name: dd-demo-datadog-agent-sh
    environment:
      - DD_API_KEY=${DD_API_KEY:?DD_API_KEY not set — run via `make up-mock-app`}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      # Disable auto multi-line detection. Its tokenizer (the
      # decoder/preprocessor that owns user_samples / timestamp_detector /
      # pattern_table) error-logs "Tokens are required ..." once per low-token
      # line when collecting all container logs — pure noise that floods the
      # agent output. We don't need multi-line aggregation for these
      # single-line JSON/uvicorn logs.
      - DD_LOGS_CONFIG_AUTO_MULTI_LINE_DETECTION=false
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_EXCLUDE=name:dd-demo-otel-collector name:dd-demo-kafka
      - DD_TAGS=dd-demo-toolkit:true vertical:healthcare incident_domain:care-experience env:demo
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      # Postgres (DBM) + Redis integration configs.
      - ./docker/datadog/sensing/conf.d/postgres.d:/etc/datadog-agent/conf.d/postgres.d:ro
      - ./docker/datadog/sensing/conf.d/redisdb.d:/etc/datadog-agent/conf.d/redisdb.d:ro
    restart: unless-stopped
    profiles:
      - mock-app

  rtls-location-service:
    build: {context: ./docker/sensing_hospital, dockerfile: Dockerfile}
    container_name: dd-demo-rtls-location-service
    command: ["ddtrace-run", "uvicorn", "rtls_location_service:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      datadog-agent-sh: {condition: service_started}
    environment:
      - PYTHONUNBUFFERED=1
      - RTLS_AUTO_CASCADE=${RTLS_AUTO_CASCADE:-true}
