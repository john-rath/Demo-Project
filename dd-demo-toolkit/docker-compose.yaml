  # Datadog Synthetics private-location worker — executes synthetic tests from
  # INSIDE the compose network so they can reach the local app (public managed
  # locations can't hit localhost). Gated by its own `synthetics` profile since
  # it needs a private-location config blob (create the PL in Datadog first).
  # Drives the RUM-instrumented care-portal to generate browser traffic.
  synthetics-private-location:
    image: datadog/synthetics-private-location-worker:latest
    container_name: dd-demo-synthetics-pl
    environment:
      # JSON config blob Datadog returns when you create a private location.
      # Optional + empty-default on purpose: compose interpolates the whole
      # file before filtering by profile, so a `:?` (required) here would
      # break EVERY compose call (build/up) when it's unset. The worker only
      # runs under `make up-synthetics`; set this in .env before that. RUM
      # also populates without it — just open the care-portal in a browser.
      - DATADOG_PRIVATE_LOCATION_CONFIG=${DATADOG_PRIVATE_LOCATION_CONFIG:-}
    restart: unless-stopped
    profiles:
      - synthetics

  # --- Data layer (k8s-portable: StatefulSet/RDS + ElastiCache on AWS) -------
  sensing-postgres:
    image: postgres:16-alpine
    container_name: dd-demo-sensing-postgres
    # Preload pg_stat_statements so the Agent's DBM query_metrics populate.
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "track_activity_query_size=4096"
    environment:
      - POSTGRES_DB=sensing
      - POSTGRES_USER=sensing
      - POSTGRES_PASSWORD=sensing
    volumes:
      - ./docker/sensing_hospital/initdb:/docker-entrypoint-initdb.d:ro
      - sensing-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sensing -d sensing"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    profiles:
      - mock-app

  sensing-redis:
    image: redis:7-alpine
    container_name: dd-demo-sensing-redis
    healthcheck:
