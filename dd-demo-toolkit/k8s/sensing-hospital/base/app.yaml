# Sensing Hospital app mesh — one Deployment (+ Service for HTTP services) per
# compose service. All share sensing-config (ConfigMap) + sensing-secrets
# (Secret) via envFrom; DD_AGENT_HOST comes from the node (DaemonSet agent).
# Image sensing-hospital:latest — build from docker/sensing_hospital/Dockerfile
# and push to ECR, then override via a Kustomize `images:` transformer.

# ---------- HTTP services (have a Service) ----------------------------------
apiVersion: apps/v1
kind: Deployment
metadata: {name: care-portal, namespace: sensing-hospital}
spec:
  replicas: 1
  selector: {matchLabels: {app: care-portal}}
  template:
    metadata: {labels: {app: care-portal, tags.datadoghq.com/service: care-portal}}
    spec:
      containers:
        - name: care-portal
          image: sensing-hospital:latest
          command: ["ddtrace-run", "uvicorn", "care_portal:app", "--host", "0.0.0.0", "--port", "8080"]
          ports: [{containerPort: 8080}]
          envFrom:
            - {configMapRef: {name: sensing-config}}
            - {secretRef: {name: sensing-secrets}}
          env:
            - {name: DD_SERVICE, value: care-portal}
            - {name: DD_DEPLOYMENT, value: cloud}
            - {name: DD_LOGS_INJECTION, value: "true"}
            - {name: DD_AGENT_HOST, valueFrom: {fieldRef: {fieldPath: status.hostIP}}}
          readinessProbe: {httpGet: {path: /healthz, port: 8080}, initialDelaySeconds: 5, periodSeconds: 10}
---
apiVersion: v1
kind: Service
metadata: {name: care-portal, namespace: sensing-hospital}
spec:
  selector: {app: care-portal}
  ports: [{port: 8080, targetPort: 8080}]
---
