apiVersion: v1
kind: ConfigMap
metadata:
  name: sensing-config
  namespace: sensing-hospital
data:
  DD_ENV: "demo"
  DD_SITE: "datadoghq.com"
  DD_VERSION: "1.0.0"
  # In-cluster service DNS (swap DB_HOST/REDIS_HOST for RDS/ElastiCache on AWS).
  DB_HOST: "sensing-postgres"
  DB_NAME: "sensing"
  DB_USER: "sensing"
  REDIS_HOST: "sensing-redis"
  ROUTER_URL: "http://care-event-router:8080"
  PLATFORM_URL: "http://care-experience-platform:8080"
  RTLS_URL: "http://rtls-location-service:8080"
  PATIENT_CONTEXT_URL: "http://patient-context-service:8080"
  CLINICAL_ALERTS_URL: "http://clinical-alerts-service:8080"
  NOTIFICATION_URL: "http://notification-service:8080"
  SUMMARY_URL: "http://care-summary-api:8080"
