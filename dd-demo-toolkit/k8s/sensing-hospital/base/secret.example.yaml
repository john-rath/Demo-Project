# EXAMPLE ONLY — do not commit real values. Create the real Secret out of band:
#   kubectl -n sensing-hospital create secret generic sensing-secrets \
#     --from-literal=DD_API_KEY=*** \
#     --from-literal=DB_PASSWORD=sensing \
#     --from-literal=DD_RUM_APPLICATION_ID=*** \
#     --from-literal=DD_CLIENT_TOKEN=***
apiVersion: v1
kind: Secret
metadata:
  name: sensing-secrets
  namespace: sensing-hospital
type: Opaque
stringData:
  DD_API_KEY: "REPLACE_ME"
  DB_PASSWORD: "sensing"
  DD_RUM_APPLICATION_ID: ""
  DD_CLIENT_TOKEN: ""
