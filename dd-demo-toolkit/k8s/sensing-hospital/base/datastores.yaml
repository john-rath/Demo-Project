# Self-contained data layer. On AWS, delete this file from the kustomization
# and point DB_HOST/REDIS_HOST (ConfigMap) at RDS + ElastiCache instead.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sensing-pgdata
  namespace: sensing-hospital
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensing-postgres
  namespace: sensing-hospital
spec:
  replicas: 1
  selector:
    matchLabels: {app: sensing-postgres}
  template:
    metadata:
      labels: {app: sensing-postgres}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
          env:
            - {name: POSTGRES_DB, value: sensing}
            - {name: POSTGRES_USER, value: sensing}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: sensing-secrets, key: DB_PASSWORD}}
          ports: [{containerPort: 5432}]
          volumeMounts:
            - {name: pgdata, mountPath: /var/lib/postgresql/data}
      volumes:
        - name: pgdata
          persistentVolumeClaim: {claimName: sensing-pgdata}
---
apiVersion: v1
kind: Service
metadata:
  name: sensing-postgres
  namespace: sensing-hospital
spec:
  selector: {app: sensing-postgres}
  ports: [{port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sensing-redis
  namespace: sensing-hospital
spec:
  replicas: 1
  selector:
    matchLabels: {app: sensing-redis}
  template:
    metadata:
      labels: {app: sensing-redis}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata:
  name: sensing-redis
  namespace: sensing-hospital
spec:
  selector: {app: sensing-redis}
  ports: [{port: 6379, targetPort: 6379}]
