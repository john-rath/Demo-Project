receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    send_batch_max_size: 1500
    timeout: 10s

  resource:
    attributes:
      - key: env
        value: demo
        action: upsert

exporters:
  datadog:
    api:
      key: ${env:DD_API_KEY}
      site: ${env:DD_SITE}
    metrics:
      histograms:
        mode: distributions
      sums:
        cumulative_monotonic_mode: to_delta
    traces:
      span_name_as_resource_name: true
    hostname: ""

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions:
    - health_check
    - zpages

  pipelines:
    metrics:
      receivers:
        - otlp
      processors:
        - resource
        - batch
      exporters:
        - datadog
        - debug

    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - datadog
        - debug

    logs:
      receivers:
        - otlp
      processors:
        - resource
        - batch
      exporters:
        - datadog
        - debug
