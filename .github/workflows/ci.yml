name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        working-directory: dd-demo-toolkit
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: black --check
        working-directory: dd-demo-toolkit
        run: black --check dd_demo_toolkit dd_demo_toolkit_ui
      - name: isort --check
        working-directory: dd-demo-toolkit
        run: isort --check-only dd_demo_toolkit dd_demo_toolkit_ui
      - name: flake8
        working-directory: dd-demo-toolkit
        run: flake8 dd_demo_toolkit dd_demo_toolkit_ui --max-line-length=100 --extend-ignore=E203,W503

  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so datadog-ci can attach git metadata (branch,
          # commit, author) to the uploaded coverage report.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: dd-demo-toolkit
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,ui]'
      - name: Run tests
        working-directory: dd-demo-toolkit
        # Enable Datadog Test Optimization (`pytest --ddtrace`) when the
        # DD_API_KEY secret is configured; otherwise run plain pytest so the
        # suite still passes for forks / unconfigured repos. Either way,
        # pytest-cov writes coverage.xml (see pyproject `addopts`).
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE || 'datadoghq.com' }}
          DD_CIVISIBILITY_ENABLED: "true"
          DD_CIVISIBILITY_AGENTLESS_ENABLED: "true"
          DD_SERVICE: dd-demo-toolkit
          DD_ENV: ci
        run: |
          if [ -n "$DD_API_KEY" ]; then
            echo "Datadog Test Optimization enabled"
            pytest --ddtrace
          else
            echo "DD_API_KEY not set — running tests without Test Optimization"
            pytest
          fi
      - name: Upload code coverage to Datadog
        # Runs after tests (pass or fail) so partial coverage still uploads.
        # No-op when the secret is absent; never fails the build.
        if: ${{ always() }}
        continue-on-error: true
        working-directory: dd-demo-toolkit
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: ${{ vars.DD_SITE || 'datadoghq.com' }}
        run: |
          if [ -n "$DD_API_KEY" ] && [ -f coverage.xml ]; then
            npm install -g @datadog/datadog-ci
            datadog-ci coverage upload coverage.xml
          else
            echo "Skipping Datadog coverage upload (DD_API_KEY unset or coverage.xml missing)"
          fi

  validate-verticals:
    # Every vertical's YAML/JSON/plugins must parse cleanly.
    # Catches the "phantom-metric" / "broken-dashboard" class of bug that
    # otherwise only shows up on stage during a customer demo.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        vertical: [finance, healthcare, hospitality, insurance, manufacturing]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        working-directory: dd-demo-toolkit
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: dd-demo validate --vertical ${{ matrix.vertical }}
        working-directory: dd-demo-toolkit
        run: dd-demo validate --vertical ${{ matrix.vertical }}

  docker-build:
    # Catches Dockerfile regressions and lockfile/dep drift early.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build simulator image
        working-directory: dd-demo-toolkit
        run: docker build -t dd-demo-toolkit:ci .
      - name: Build data_obs image
        working-directory: dd-demo-toolkit/data_obs
        run: docker build -t dd-demo-data-obs:ci .
      - name: Build dbt_runner image
        working-directory: dd-demo-toolkit/data_obs
        run: docker build -t dd-demo-dbt-runner:ci -f dbt_runner/Dockerfile .
      - name: Build llm_experiments image
        working-directory: dd-demo-toolkit/data_obs/llm_experiments
        run: docker build -t dd-demo-llm-experiments:ci .
